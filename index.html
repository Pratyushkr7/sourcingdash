/* === Trade lanes (origin country → Noida destination) === */
function TradeLanes({ suppliers, rfq, onHover }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);

  // Aggregate suppliers by country with avg coordinates
  const counts = {};
  suppliers.forEach(s => {
    if (s.lat == null) return;
    if (!counts[s.countryCode]) counts[s.countryCode] = { count: 0, country: s.country, lat: 0, lng: 0, names: [] };
    counts[s.countryCode].count++;
    counts[s.countryCode].lat += s.lat;
    counts[s.countryCode].lng += s.lng;
    counts[s.countryCode].names.push(s.name);
  });
  Object.values(counts).forEach(c => { c.lat /= c.count; c.lng /= c.count; });
  const sorted = Object.entries(counts).sort((a, b) => b[1].count - a[1].count);
  const imports = sorted.filter(([cc]) => cc !== 'IN');
  const domestic = counts['IN'] ? counts['IN'].count : 0;
  const maxCount = Math.max(1, ...sorted.map(([, c]) => c.count));

  useEffect(() => {
    if (!containerRef.current) return;
    const tryInit = () => {
      if (typeof window.L === 'undefined') { setTimeout(tryInit, 60); return; }
      const L = window.L;
      if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
      const map = L.map(containerRef.current, {
        center: [30, -15],
        zoom: 2,
        minZoom: 2,
        maxZoom: 2,
        maxBounds: [[-70, -180], [82, 180]],
        maxBoundsViscosity: 1.0,
        worldCopyJump: false,
        zoomControl: false,
        attributionControl: true,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        keyboard: false,
        dragging: false
      });
      mapRef.current = map;
      // OpenStreetMap tiles — works reliably on most networks; falls back gracefully if blocked
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        minZoom: 2,
        noWrap: true,
        bounds: [[-90, -180], [90, 180]],
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const dest = [rfq.delivery.lat, rfq.delivery.lng];

      // Draw curved polylines (great-circle approximation via mid-point arc) for each import lane
      imports.forEach(([cc, c]) => {
        const weight = 1.5 + (c.count / maxCount) * 3;
        const origin = [c.lat, c.lng];
        // Generate a curved path with a slight north-arching mid-point
        const midLat = (origin[0] + dest[0]) / 2 + 15;
        const midLng = (origin[1] + dest[1]) / 2;
        // Sample bezier-ish points
        const points = [];
        for (let t = 0; t <= 1; t += 0.04) {
          const lat = (1 - t) * (1 - t) * origin[0] + 2 * (1 - t) * t * midLat + t * t * dest[0];
          const lng = (1 - t) * (1 - t) * origin[1] + 2 * (1 - t) * t * midLng + t * t * dest[1];
          points.push([lat, lng]);
        }
        L.polyline(points, {
          color: '#5B89C8',
          weight: weight,
          opacity: 0.7,
          dashArray: null
        }).addTo(map);

        // Origin marker
        const r = 8 + (c.count / maxCount) * 10;
        const icon = L.divIcon({
          className: '',
          html: `<div class="mi-marker" style="width:${r*2}px;height:${r*2}px"></div>`,
          iconSize: [r*2, r*2],
          iconAnchor: [r, r]
        });
        const m = L.marker([c.lat, c.lng], { icon }).addTo(map);
        m.bindPopup(`
          <div style="padding: 12px 14px; min-width: 200px">
            <div style="font-weight: 600; color: #1A2540; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px">
              <span style="font-size:16px">${flagEmojiHTML(cc)}</span> ${c.country} → IN
            </div>
            <div style="display: grid; grid-template-columns: 1fr auto; gap: 4px 14px; font-size: 11.5px;">
              <span style="color:#677488">Suppliers</span><span style="font-family: var(--font-mono); font-weight: 600; color: #1A2540; text-align: right">${c.count}</span>
              <span style="color:#677488">Lane</span><span style="font-family: var(--font-mono); font-weight: 600; color: #2B5A9C; text-align: right">${cc} → IN (Noida)</span>
              <span style="color:#677488">Import duties</span><span style="font-family: var(--font-mono); font-weight: 600; color: #B36800; text-align: right">~7.5% + 18% IGST</span>
            </div>
          </div>
        `, { closeButton: false });
      });

      // Domestic origin (India) marker — green
      if (counts['IN']) {
        const c = counts['IN'];
        const r = 10 + (c.count / maxCount) * 10;
        const icon = L.divIcon({
          className: '',
          html: `<div class="mi-marker dom" style="width:${r*2}px;height:${r*2}px"></div>`,
          iconSize: [r*2, r*2],
          iconAnchor: [r, r]
        });
        const m = L.marker([c.lat, c.lng], { icon }).addTo(map);
        m.bindPopup(`
          <div style="padding: 12px 14px; min-width: 200px">
            <div style="font-weight: 600; color: #1A2540; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px">
              <span style="font-size:16px">${flagEmojiHTML('IN')}</span> Domestic (India)
            </div>
            <div style="display: grid; grid-template-columns: 1fr auto; gap: 4px 14px; font-size: 11.5px;">
              <span style="color:#677488">Suppliers</span><span style="font-family: var(--font-mono); font-weight: 600; color: #1A2540; text-align: right">${c.count}</span>
              <span style="color:#677488">Routing</span><span style="font-family: var(--font-mono); font-weight: 600; color: #1F4D2A; text-align: right">domestic transport</span>
              <span style="color:#677488">Duties</span><span style="font-family: var(--font-mono); font-weight: 600; color: #1F4D2A; text-align: right">no customs</span>
            </div>
          </div>
        `, { closeButton: false });
      }

      // Destination — Noida red pin
      const destIcon = L.divIcon({
        className: '',
        html: '<div class="mi-marker client" style="width:14px;height:14px"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
      L.marker(dest, { icon: destIcon }).addTo(map)
        .bindPopup(`<div style="padding: 10px 12px"><div style="font-weight: 600; color: #1A2540; font-size: 13px">HMEL · Delivery</div><div style="font-size: 11.5px; color: #677488; margin-top: 3px">${rfq.delivery.city}, ${rfq.delivery.countryCode}</div></div>`, { closeButton: false });

      // Fixed view — no fitBounds (locked at zoom 2 showing the whole route)
    };
    tryInit();
    return () => {
      if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
    };
  }, [suppliers, rfq]);

  return (
    <div style={{display: 'flex', flexDirection: 'column', gap: '12px', height: '100%', minHeight: 0}}>
      <div ref={containerRef} className="leaflet-map" style={{flex: 1, minHeight: 360, borderRadius: 10, overflow: 'hidden', background: '#EDE9DF'}} />
      <div style={{display: 'flex', alignItems: 'center', gap: 18, flexWrap: 'wrap'}}>
        <div style={{fontSize: '9.5px', color: '#8B95A7', letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600}}>Lanes:</div>
        {imports.map(([cc, c]) => (
          <div key={cc} style={{display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#1A2540'}}>
            <span style={{fontSize: 14}}>{flagEmoji(cc)}</span>
            <span style={{color: '#8B95A7'}}>→</span>
            <span style={{fontSize: 14}}>{flagEmoji('IN')}</span>
            <span style={{fontFamily: 'var(--font-mono)', fontWeight: 700, marginLeft: 2}}>{c.count}</span>
          </div>
        ))}
        {domestic > 0 && (
          <div style={{display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#1A2540', paddingLeft: 12, borderLeft: '1px solid #E2DED4'}}>
            <span style={{fontSize: 14}}>{flagEmoji('IN')}</span>
            <span style={{color: '#1F4D2A', fontSize: 11}}>domestic</span>
            <span style={{fontFamily: 'var(--font-mono)', fontWeight: 700, color: '#1F4D2A'}}>{domestic}</span>
          </div>
        )}
        <div style={{marginLeft: 'auto', fontSize: 10.5, color: '#8B95A7'}}>
          Imports incur ~7.5% customs + 18% IGST · domestic awards remove both
        </div>
      </div>
    </div>
  );
}

/* === Price vs Lead Time scatter === */
function PriceLeadScatter({ suppliers, currency, onHover, openProfile }) {
  const valued = suppliers.filter(s => s.ddpLowINR != null && s.leadTimeLowWk != null);
  if (valued.length === 0) return <div style={{color: '#8B95A7', textAlign: 'center', padding: '60px 0'}}>No data.</div>;
  const xMax = Math.max(...valued.map(s => s.leadTimeHighWk)) * 1.05;
  const yMin = Math.min(...valued.map(s => s.ddpLowINR)) * 0.9;
  const yMax = Math.max(...valued.map(s => s.ddpHighINR)) * 1.05;
  // svg viewBox: 0 0 600 280, leave 50px margin
  const ML = 60, MR = 18, MT = 12, MB = 30;
  const xPx = lt => ML + (lt / xMax) * (600 - ML - MR);
  const yPx = p  => 280 - MB - ((p - yMin) / (yMax - yMin)) * (280 - MT - MB);
  const handleMove = (s, ev) => onHover && onHover({
    visible: true, x: ev.clientX, y: ev.clientY,
    title: <span>{flagEmoji(s.countryCode)} <strong>{s.name}</strong></span>,
    rows: [
      { k: 'Median price', v: fmtMoney((s.ddpLowINR + s.ddpHighINR) / 2, currency), cls: 'green' },
      { k: 'Lead time', v: `${s.leadTimeLowWk}–${s.leadTimeHighWk} weeks` },
      { k: 'Tank tech', v: s.tankTech || '—' },
      { k: 'Type', v: s.type }
    ]
  });
  const handleLeave = () => onHover && onHover({ visible: false });
  // y gridlines
  const yTicks = [yMin, yMin + (yMax-yMin)*0.25, yMin + (yMax-yMin)*0.5, yMin + (yMax-yMin)*0.75, yMax];
  const xTicks = [0, xMax * 0.25, xMax * 0.5, xMax * 0.75, xMax];
  return (
    <div className="mi-scatter">
      <svg viewBox="0 0 600 280" preserveAspectRatio="none">
        {/* axes */}
        <line x1={ML} y1={MT} x2={ML} y2={280 - MB} stroke="#E2DED4" strokeWidth="1" />
        <line x1={ML} y1={280 - MB} x2={600 - MR} y2={280 - MB} stroke="#E2DED4" strokeWidth="1" />
        {/* y-grid + labels */}
        {yTicks.map((t, i) => (
          <g key={`y${i}`}>
            <line x1={ML} y1={yPx(t)} x2={600 - MR} y2={yPx(t)} stroke="#F0EEE7" strokeWidth="1" strokeDasharray="2,2" />
            <text x={ML - 6} y={yPx(t) + 3} textAnchor="end" className="mi-scatter-axis-label">{fmtMoney(t, currency)}</text>
          </g>
        ))}
        {/* x labels */}
        {xTicks.map((t, i) => (
          <text key={`x${i}`} x={xPx(t)} y={280 - MB + 14} textAnchor="middle" className="mi-scatter-axis-label">{Math.round(t)} wk</text>
        ))}
        {/* axis titles */}
        <text x={ML + (600 - ML - MR) / 2} y={278} textAnchor="middle" className="mi-scatter-axis-title">Lead time (weeks)</text>
        <text transform={`rotate(-90 14 ${MT + (280 - MT - MB) / 2})`} x={14} y={MT + (280 - MT - MB) / 2 + 4} textAnchor="middle" className="mi-scatter-axis-title">Est. landed cost</text>
        {/* dots */}
        {valued.map(s => {
          const midX = (s.leadTimeLowWk + s.leadTimeHighWk) / 2;
          const midY = (s.ddpLowINR + s.ddpHighINR) / 2;
          const isDom = s.countryCode === 'IN';
          return (
            <circle key={s.id}
              className="mi-scatter-dot"
              cx={xPx(midX)} cy={yPx(midY)}
              r="6"
              fill={isDom ? '#1F4D2A' : '#5B89C8'}
              fillOpacity="0.65"
              stroke={isDom ? '#1F4D2A' : '#5B89C8'}
              strokeWidth="1.5"
              onMouseMove={ev => handleMove(s, ev)}
              onMouseLeave={handleLeave}
              onClick={() => openProfile && openProfile(s.id)}
            />
          );
        })}
      </svg>
    </div>
  );
}

/* === MarketIntelOverview — main component === */
function MarketIntelOverview({ suppliers, allSuppliers, rfq, currency, mode, updateSupplier, openSupplierProfile }) {
  const [tip, setTip] = useState(null);
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({
    originCountry: '',  // '' = all
    tankTech: '',       // '' = all
    pesoOnly: false
  });
  const [openDropdown, setOpenDropdown] = useState(null); // 'country' | 'tech' | null

  // Close dropdown on outside click
  useEffect(() => {
    if (!openDropdown) return;
    const close = (e) => {
      if (!e.target.closest('.mi-chip-dropdown') && !e.target.closest('.mi-chip')) setOpenDropdown(null);
    };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [openDropdown]);

  // Build option lists from the full dataset
  const countryOptions = useMemo(() => {
    const map = {};
    suppliers.forEach(s => { if (!map[s.countryCode]) map[s.countryCode] = { cc: s.countryCode, name: s.country }; });
    return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
  }, [suppliers]);
  const techOptions = useMemo(() => {
    const set = new Set(suppliers.map(s => s.tankTech).filter(Boolean));
    return [...set].sort();
  }, [suppliers]);

  // Filtering pipeline: search + chip filters + toggles
  const filtered = useMemo(() => {
    let out = suppliers;
    if (search.trim()) {
      const q = search.toLowerCase();
      out = out.filter(s =>
        s.name.toLowerCase().includes(q) ||
        (s.tankTech || '').toLowerCase().includes(q) ||
        (s.country || '').toLowerCase().includes(q) ||
        (s.city || '').toLowerCase().includes(q)
      );
    }
    if (filters.originCountry) out = out.filter(s => s.countryCode === filters.originCountry);
    if (filters.tankTech)      out = out.filter(s => s.tankTech === filters.tankTech);
    if (filters.pesoOnly)      out = out.filter(s => s.offers && s.offers.certs && s.offers.certs.peso);
    return out;
  }, [suppliers, search, filters]);

  const setFilter = (k, v) => setFilters(f => ({ ...f, [k]: v }));
  const clearFilters = () => setFilters({ originCountry: '', tankTech: '', pesoOnly: false });
  const activeFilterCount = (filters.originCountry ? 1 : 0) + (filters.tankTech ? 1 : 0) + (filters.pesoOnly ? 1 : 0);

  // KPIs
  const valued = filtered.filter(s => s.ddpLowINR != null);
  const mids = valued.map(s => (s.ddpLowINR + s.ddpHighINR) / 2).sort((a,b) => a - b);
  const median = mids.length ? mids[Math.floor(mids.length / 2)] : 0;
  const minLow = valued.length ? Math.min(...valued.map(s => s.ddpLowINR)) : 0;
  const maxHigh = valued.length ? Math.max(...valued.map(s => s.ddpHighINR)) : 0;
  const verified = filtered.filter(s => !s.isPlaceholder).length;
  const countries = new Set(filtered.map(s => s.country)).size;

  // === Second-row analytical KPIs ===
  // 1. Domestic share — % of suppliers based in India
  const domestic = filtered.filter(s => s.countryCode === 'IN');
  const imports  = filtered.filter(s => s.countryCode !== 'IN');
  const domesticShare = filtered.length ? Math.round((domestic.length / filtered.length) * 100) : 0;

  // 2. PESO licence coverage — % holding the mandatory licence
  const pesoHolders  = filtered.filter(s => s.offers && s.offers.certs && s.offers.certs.peso);
  const pesoCoverage = filtered.length ? Math.round((pesoHolders.length / filtered.length) * 100) : 0;

  // 3. Import cost premium — how much more imports cost vs domestic (median ÷ median)
  const domMids = domestic.filter(s => s.ddpLowINR != null).map(s => (s.ddpLowINR + s.ddpHighINR) / 2);
  const impMids = imports.filter(s => s.ddpLowINR != null).map(s => (s.ddpLowINR + s.ddpHighINR) / 2);
  const avgDom = domMids.length ? domMids.reduce((a,b) => a+b, 0) / domMids.length : 0;
  const avgImp = impMids.length ? impMids.reduce((a,b) => a+b, 0) / impMids.length : 0;
  const importPremium = avgDom > 0 ? Math.round(((avgImp - avgDom) / avgDom) * 100) : 0;

  // 4. Median lead time — central tendency across all suppliers
  const ltMids = filtered.filter(s => s.leadTimeLowWk != null).map(s => (s.leadTimeLowWk + s.leadTimeHighWk) / 2).sort((a,b) => a-b);
  const medianLeadTime = ltMids.length ? Math.round(ltMids[Math.floor(ltMids.length / 2)]) : 0;
  const fastestLeadTime = ltMids.length ? Math.round(ltMids[0]) : 0;

  return (
    <div className="market-intel">
      {/* Page header */}
      <div className="mi-header">
        <div className="mi-header-title">
          <span style={{fontSize: '15px', color: '#677488', cursor: 'pointer'}} title="back">←</span>
          <span><strong>{filtered.length} suppliers</strong> for <em>"{rfq.product}"</em></span>
        </div>
        <div className="mi-header-actions">
          <div className="mi-search-pill">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search suppliers, regions, tech…"
            />
            <span className="kbd">⌘ K</span>
          </div>
          <button className="mi-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            Save search
          </button>
          <button className="mi-btn primary">
            {I.download()} Export
          </button>
        </div>
      </div>

      {/* Filter chips — clickable, functional */}
      <div className="mi-filters">
        {/* Origin country dropdown */}
        <div style={{position: 'relative'}}>
          <button
            className={`mi-chip ${filters.originCountry ? 'active' : ''}`}
            onClick={() => setOpenDropdown(openDropdown === 'country' ? null : 'country')}
          >
            <span>📍</span>
            Origin country{filters.originCountry ? `: ${filters.originCountry}` : ''}
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          {openDropdown === 'country' && (
            <div className="mi-chip-dropdown">
              <div className="mi-chip-opt" onClick={() => { setFilter('originCountry', ''); setOpenDropdown(null); }}>
                <span>All countries</span>
                {!filters.originCountry && <span style={{color: '#1F4D2A'}}>✓</span>}
              </div>
              {countryOptions.map(c => (
                <div className="mi-chip-opt" key={c.cc} onClick={() => { setFilter('originCountry', c.cc); setOpenDropdown(null); }}>
                  <span>{flagEmoji(c.cc)} {c.name}</span>
                  {filters.originCountry === c.cc && <span style={{color: '#1F4D2A'}}>✓</span>}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Tank technology dropdown */}
        <div style={{position: 'relative'}}>
          <button
            className={`mi-chip ${filters.tankTech ? 'active' : ''}`}
            onClick={() => setOpenDropdown(openDropdown === 'tech' ? null : 'tech')}
          >
            <span>🏭</span>
            Tank technology{filters.tankTech ? `: ${filters.tankTech}` : ''}
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          {openDropdown === 'tech' && (
            <div className="mi-chip-dropdown">
              <div className="mi-chip-opt" onClick={() => { setFilter('tankTech', ''); setOpenDropdown(null); }}>
                <span>All technologies</span>
                {!filters.tankTech && <span style={{color: '#1F4D2A'}}>✓</span>}
              </div>
              {techOptions.map(t => (
                <div className="mi-chip-opt" key={t} onClick={() => { setFilter('tankTech', t); setOpenDropdown(null); }}>
                  <span>{t}</span>
                  {filters.tankTech === t && <span style={{color: '#1F4D2A'}}>✓</span>}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Working toggles */}
        <span className="mi-toggle-pill" onClick={() => setFilter('pesoOnly', !filters.pesoOnly)} style={{cursor: 'pointer'}}>
          <span className={`mi-toggle-track ${filters.pesoOnly ? 'on' : ''}`}></span>
          PESO-ready only
        </span>

        {activeFilterCount > 0 && (
          <button className="mi-chip" onClick={clearFilters} style={{color: '#DC2626', borderColor: '#DC2626', marginLeft: 'auto'}}>
            Clear {activeFilterCount} filter{activeFilterCount > 1 ? 's' : ''} ✕
          </button>
        )}
      </div>

      {/* KPI row */}
      <div className="mi-kpi-row">
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </div>
          <div className="lbl">Market median</div>
          <div className="val">{fmtMoney(median, currency)}<span className="unit">/unit</span></div>
          <div className="sub">22 KL underground UST, DDP</div>
        </div>
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div className="lbl">Market range</div>
          <div className="val">{fmtMoney(minLow, currency)}<span className="sep">–</span>{fmtMoney(maxHigh, currency)}</div>
          <div className="sub">low to high estimate band</div>
        </div>
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          </div>
          <div className="lbl">Unique suppliers</div>
          <div className="val">{filtered.length}</div>
          <div className="sub">{verified} verified · {filtered.length - verified} placeholder</div>
        </div>
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          </div>
          <div className="lbl">Unique geographies</div>
          <div className="val">{countries}</div>
          <div className="sub">countries with active supply</div>
        </div>
      </div>

      {/* Row 1: Top suppliers / Top regions */}
      <div className="mi-row two">
        <div className="mi-card">
          <div className="head">
            <div className="title">Top suppliers</div>
            <div className="mi-ctl">Median price ↕</div>
          </div>
          <div className="body">
            <TopSuppliersBars suppliers={filtered} currency={currency} onHover={setTip} openProfile={openSupplierProfile} />
          </div>
        </div>
        <div className="mi-card">
          <div className="head">
            <div className="title">Top regions</div>
            <div className="mi-ctl">Supplier count ↕</div>
          </div>
          <div className="body">
            <TopRegionsBars suppliers={filtered} onHover={setTip} />
          </div>
        </div>
      </div>

      {/* Row 1.5: 4 analytical KPI cards — same format as top KPIs */}
      <div className="mi-kpi-row" style={{marginTop: 14, marginBottom: 14}}>
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 12a9 9 0 1018 0 9 9 0 00-18 0z"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
          </div>
          <div className="lbl">Domestic share</div>
          <div className="val" style={{color: '#1F4D2A'}}>{domesticShare}<span className="unit">%</span></div>
          <div className="sub">{domestic.length} India · {imports.length} import</div>
          <div style={{marginTop: 8, height: 5, background: '#EDEAE0', borderRadius: 3, overflow: 'hidden', display: 'flex'}}>
            <div style={{width: `${domesticShare}%`, background: '#1F4D2A'}}></div>
            <div style={{width: `${100 - domesticShare}%`, background: '#5B89C8'}}></div>
          </div>
        </div>
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
          </div>
          <div className="lbl">PESO licence coverage</div>
          <div className="val" style={{color: pesoCoverage >= 75 ? '#1F8C3C' : pesoCoverage >= 50 ? '#B36800' : '#DC2626'}}>{pesoCoverage}<span className="unit">%</span></div>
          <div className="sub">{pesoHolders.length} of {filtered.length} hold licence</div>
          <div style={{marginTop: 8, height: 5, background: '#EDEAE0', borderRadius: 3, overflow: 'hidden'}}>
            <div style={{width: `${pesoCoverage}%`, height: '100%', background: pesoCoverage >= 75 ? '#1F8C3C' : pesoCoverage >= 50 ? '#B36800' : '#DC2626'}}></div>
          </div>
        </div>
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div className="lbl">Import cost premium</div>
          <div className="val" style={{color: '#B36800'}}>
            {importPremium > 0 ? '+' : ''}{importPremium}<span className="unit">%</span>
          </div>
          <div className="sub">imports vs domestic median</div>
          <div style={{marginTop: 8, fontSize: 10.5, color: '#677488', display: 'flex', justifyContent: 'space-between', fontFamily: 'var(--font-mono)'}}>
            <span>dom {fmtMoney(avgDom, currency)}</span>
            <span style={{color: '#B36800'}}>imp {fmtMoney(avgImp, currency)}</span>
          </div>
        </div>
        <div className="mi-kpi">
          <div className="ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div className="lbl">Median lead time</div>
          <div className="val" style={{color: '#2B5A9C'}}>{medianLeadTime}<span className="unit">weeks</span></div>
          <div className="sub">fastest: {fastestLeadTime} wk · ex-fab to delivery</div>
          <div style={{marginTop: 8, height: 5, background: '#EDEAE0', borderRadius: 3, overflow: 'hidden', position: 'relative'}}>
            <div style={{position: 'absolute', left: 0, top: 0, bottom: 0, width: `${Math.min(100, (medianLeadTime / 22) * 100)}%`, background: 'linear-gradient(90deg, #5B89C8, #2B5A9C)'}}></div>
          </div>
        </div>
      </div>

      {/* Row 2: Supply concentration map / Price distribution */}
      <div className="mi-row two">
        <div className="mi-card" style={{padding: '20px 22px 18px'}}>
          <div className="head">
            <div className="title">Supply concentration by country</div>
            <div className="mi-ctl">Hover bubbles ⓘ</div>
          </div>
          <div className="body" style={{minHeight: 380}}>
            <LeafletMapLight suppliers={filtered} rfq={rfq} currency={currency} />
          </div>
        </div>
        <div className="mi-card">
          <div className="head">
            <div className="title">Price distribution</div>
            <div className="mi-ctl">Median highlighted</div>
          </div>
          <div className="body">
            <PriceHistogram suppliers={filtered} currency={currency} onHover={setTip} />
          </div>
        </div>
      </div>

      {/* Row 3: Lead time band / Trade lanes */}
      <div className="mi-row two">
        <div className="mi-card">
          <div className="head">
            <div className="title">Lead-time band by supplier</div>
            <div className="mi-ctl">Ex-fab to delivery</div>
          </div>
          <div className="body">
            <LeadTimeBand suppliers={filtered} onHover={setTip} openProfile={openSupplierProfile} />
          </div>
        </div>
        <div className="mi-card">
          <div className="head">
            <div className="title">Key trade routes</div>
            <div className="mi-ctl">Origin → Noida</div>
          </div>
          <div className="body" style={{minHeight: 280}}>
            <TradeLanes suppliers={filtered} rfq={rfq} onHover={setTip} />
          </div>
        </div>
      </div>

      <MITooltip data={tip} />
    </div>
  );
}

   APP ROOT — orchestrates state, filtering, rendering
================================================================= */
/* ================================================================
   SUMMARY STRIP — sourcing intelligence KPIs across the top
================================================================= */
function SummaryStrip({ suppliers, rfq, currency }) {
  const verified = suppliers.filter(s => s.verified && !s.isPlaceholder).length;
  const domestic = suppliers.filter(s => s.countryCode === 'IN').length;
  const imports  = suppliers.length - domestic;
  const placeholders = suppliers.filter(s => s.isPlaceholder).length;

  // PESO readiness — % of suppliers that hold PESO licence (mandatory for Indian refinery use)
  const pesoReady = suppliers.filter(s => s.offers && s.offers.certs && s.offers.certs.peso).length;

  // Cost range (low of lowest, high of highest)
  const lows  = suppliers.map(s => s.ddpLowINR).filter(v => v != null);
  const highs = suppliers.map(s => s.ddpHighINR).filter(v => v != null);
  const minLow  = lows.length  ? Math.min(...lows)  : null;
  const maxHigh = highs.length ? Math.max(...highs) : null;

  // Lead time range
  const ltLows  = suppliers.map(s => s.leadTimeLowWk).filter(v => v != null);
  const ltHighs = suppliers.map(s => s.leadTimeHighWk).filter(v => v != null);
  const minLt = ltLows.length  ? Math.min(...ltLows)  : null;
  const maxLt = ltHighs.length ? Math.max(...ltHighs) : null;

  // Technology mix - count by tank tech
  const techCount = {};
  suppliers.forEach(s => { if (s.tankTech) techCount[s.tankTech] = (techCount[s.tankTech] || 0) + 1; });
  const dominantTech = Object.entries(techCount).sort((a,b) => b[1] - a[1])[0];

  return (
    <div className="summary-strip">
      <div className="kpi">
        <span className="kpi-lbl">Market participants</span>
        <span className="kpi-val">{suppliers.length}</span>
        <span className="kpi-sub">{verified} verified · {placeholders} category placeholders</span>
      </div>
      <div className="kpi">
        <span className="kpi-lbl">Supply geography</span>
        <span className="kpi-val">{domestic}<span className="unit">IN</span> <span style={{color:'var(--text-tertiary)', margin:'0 4px'}}>·</span> {imports}<span className="unit">overseas</span></span>
        <span className="kpi-sub">{Math.round(domestic/suppliers.length * 100)}% domestic</span>
      </div>
      <div className="kpi">
        <span className="kpi-lbl">PESO licence ready</span>
        <span className={`kpi-val ${pesoReady === 0 ? 'warn' : pesoReady < verified/2 ? 'warn' : 'lime'}`}>{pesoReady}<span className="unit">/ {verified}</span></span>
        <span className="kpi-sub">mandatory for refinery use</span>
      </div>
      <div className="kpi">
        <span className="kpi-lbl">Market price band</span>
        <span className="kpi-val">{minLow != null ? fmtMoney(minLow, currency) : '—'} <span style={{color:'var(--text-tertiary)'}}>–</span> {maxHigh != null ? fmtMoney(maxHigh, currency) : '—'}</span>
        <span className="kpi-sub">DDP landed, 22 KL UST</span>
      </div>
      <div className="kpi">
        <span className="kpi-lbl">Typical lead time</span>
        <span className="kpi-val">{minLt}<span style={{color:'var(--text-tertiary)'}}>–</span>{maxLt}<span className="unit">weeks</span></span>
        <span className="kpi-sub">ex-fab to delivery</span>
      </div>
      <div className="kpi">
        <span className="kpi-lbl">Dominant technology</span>
        <span className="kpi-val info" style={{fontSize:'14px'}}>{dominantTech ? dominantTech[0] : '—'}</span>
        <span className="kpi-sub">{dominantTech ? `${dominantTech[1]} of ${suppliers.length} suppliers` : ''}</span>
      </div>
    </div>
  );
}

/* ================================================================
   RFQ SIDEBAR — slide-out panel with full requirement details
================================================================= */
function RfqSidebar({ rfq, currency, capUnit, mode, updateRfq, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const Field = ({ k, children }) => (
    <div className="rfq-sb-field">
      <span className="k">{k}</span>
      <span className="v">{children}</span>
    </div>
  );

  return (
    <>
      <div className="rfq-sb-backdrop" onClick={onClose}></div>
      <aside className="rfq-sidebar" onClick={e => e.stopPropagation()}>
        <header className="rfq-sb-head">
          <div>
            <div className="title">RFQ Requirement Details</div>
            <div className="sub">{rfq.id} · {mode === 'editor' ? 'Editor — all fields are editable' : 'Read-only'}</div>
          </div>
          <button className="close-x" style={{
            background: 'var(--bg-elev-2)',
            color: 'var(--text-secondary)',
            border: '1px solid var(--border)',
            width: '30px', height: '30px',
            borderRadius: '6px',
            cursor: 'pointer',
            display: 'inline-flex',
            alignItems: 'center',
            justifyContent: 'center'
          }} onClick={onClose}>{I.close()}</button>
        </header>
        <div className="rfq-sb-body">
          <div className="rfq-sb-section">
            <h4>Product</h4>
            <Field k="Product"><EditableText mode={mode} value={rfq.product} onChange={v => updateRfq('product', v)} multiline /></Field>
            <Field k="Category"><EditableText mode={mode} value={rfq.category} onChange={v => updateRfq('category', v)} /></Field>
            <Field k="Quantity">
              <EditableNumber mode={mode} value={rfq.quantity} onChange={v => updateRfq('quantity', v)} inline /> <span style={{color:'var(--text-tertiary)'}}>unit</span>
            </Field>
            <Field k="Capacity">
              {mode === 'editor' ? (
                <><EditableNumber mode={mode} value={rfq.capacity} onChange={v => updateRfq('capacity', v)} inline /> <span style={{color:'var(--text-tertiary)'}}>L</span></>
              ) : fmtCapacity(rfq.capacity, capUnit)}
            </Field>
            <Field k="Target price">
              {mode === 'editor' ? (
                <EditableNumber mode={mode} value={rfq.targetPriceINR} onChange={v => updateRfq('targetPriceINR', v)} suffix="₹ DDP" />
              ) : (
                <span style={{color: 'var(--lime)', fontWeight: 600}}>≤ {fmtMoney(rfq.targetPriceINR, currency)}</span>
              )}
            </Field>
          </div>

          <div className="rfq-sb-section">
            <h4>Delivery</h4>
            <Field k="City"><EditableText mode={mode} value={rfq.delivery.city} onChange={v => updateRfq('delivery.city', v)} /></Field>
            <Field k="Region"><EditableText mode={mode} value={rfq.delivery.region} onChange={v => updateRfq('delivery.region', v)} /></Field>
            <Field k="Country code"><EditableText mode={mode} value={rfq.delivery.countryCode} onChange={v => updateRfq('delivery.countryCode', v)} inline style={{textTransform:'uppercase', minWidth:'30px'}} /></Field>
            <Field k="Address"><EditableText mode={mode} value={rfq.delivery.address} onChange={v => updateRfq('delivery.address', v)} multiline /></Field>
            <Field k="Incoterm">
              {mode === 'editor' ? (
                <EditableSelect mode={mode} value={rfq.delivery.incoterm} options={['EXW','FOB','CIF','CIP','DAP','DDP']} onChange={v => updateRfq('delivery.incoterm', v)} />
              ) : rfq.delivery.incoterm}
            </Field>
            <Field k="Required by"><EditableText mode={mode} value={rfq.requiredBy} onChange={v => updateRfq('requiredBy', v)} inline /></Field>
          </div>

          <div className="rfq-sb-section">
            <h4>Properties (Min – Target – Max)</h4>
            {rfq.properties.map((p, i) => (
              <div className="rfq-sb-prop" key={p.key}>
                <div className="name">{p.label}</div>
                <div className="vals">
                  <span><span className="label">min</span>&nbsp;<span className="v">{mode === 'editor' ? <EditableNumber mode={mode} value={p.min} onChange={v => updateRfq(`properties.${i}.min`, v)} inline /> : p.min}</span></span>
                  <span><span className="label">target</span>&nbsp;<span className="v" style={{color:'var(--lime)'}}>{mode === 'editor' ? <EditableNumber mode={mode} value={p.target} onChange={v => updateRfq(`properties.${i}.target`, v)} inline /> : p.target}</span></span>
                  <span><span className="label">max</span>&nbsp;<span className="v">{mode === 'editor' ? <EditableNumber mode={mode} value={p.max} onChange={v => updateRfq(`properties.${i}.max`, v)} inline /> : p.max}</span></span>
                  <span><span className="label">unit</span>&nbsp;<span className="v">{p.unit}</span></span>
                </div>
              </div>
            ))}
          </div>

          <div className="rfq-sb-section">
            <h4>Required certifications</h4>
            {rfq.certifications.map((c, i) => (
              <div className="rfq-sb-field" key={c.key} style={{padding:'5px 0'}}>
                <span className="k" style={{textTransform:'none', letterSpacing:'normal', fontSize: '11.5px', color: c.mandatory ? 'var(--danger)' : 'var(--text-tertiary)'}}>
                  {c.mandatory ? '!' : '○'} {c.mandatory ? 'Mandatory' : 'Preferred'}
                </span>
                <span className="v">{c.label}</span>
              </div>
            ))}
          </div>

          <div className="rfq-sb-section">
            <h4>Required documents</h4>
            {rfq.requiredDocs.map(d => (
              <div className="rfq-sb-field" key={d.key} style={{padding:'5px 0'}}>
                <span className="k" style={{textTransform:'none', letterSpacing:'normal', fontSize: '11.5px'}}>✓ Required</span>
                <span className="v">{d.label}</span>
              </div>
            ))}
          </div>
        </div>
      </aside>
    </>
  );
}


function App() {
  const [currency, setCurrency] = useState('INR');
  const [capUnit, setCapUnit] = useState('KL');
  const [activeTab, setActiveTab] = useState('overview');
  const mode = 'presenter'; // single view — no editor/presenter toggle
  const [toggles, setToggles] = useState({ locations: true, urls: true, confidence: true });
  const [search, setSearch] = useState('');
  const [sortState, setSortState] = useState({ key: 'ddpCostINR', dir: 'asc' });
  const [drawerOpenId, setDrawerOpenId] = useState(null);
  const [suppliers, setSuppliers] = useState(SUPPLIERS_INIT);
  const [rfq, setRfq] = useState(RFQ);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [expandedTile, setExpandedTile] = useState(null);

  // Dot-path setter for nested updates (e.g. 'offers.properties.shellThickness')
  const setDeep = (obj, path, value) => {
    const keys = path.split('.');
    const out = JSON.parse(JSON.stringify(obj));
    let t = out;
    for (let i = 0; i < keys.length - 1; i++) {
      if (t[keys[i]] == null) t[keys[i]] = {};
      t = t[keys[i]];
    }
    t[keys[keys.length - 1]] = value;
    return out;
  };
  const updateSupplier = (id, path, value) => {
    setSuppliers(prev => prev.map(s => s.id === id ? setDeep(s, path, value) : s));
  };
  const updateRfq = (path, value) => setRfq(prev => setDeep(prev, path, value));

  // Filtering pipeline (search + placeholders toggle + sort)
  const filtered = useMemo(() => {
    let out = suppliers;
    if (search.trim()) {
      const q = search.toLowerCase();
      out = out.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.productCode.toLowerCase().includes(q) ||
        (s.city || '').toLowerCase().includes(q) ||
        (s.country || '').toLowerCase().includes(q) ||
        (s.type || '').toLowerCase().includes(q)
      );
    }
    out = sortBy(out, sortState.key, sortState.dir);
    return out;
  }, [suppliers, search, sortState]);

  const counts = useMemo(() => ({
    overview: filtered.length,
    details:  filtered.length
  }), [filtered]);

  const openDrawer = (id) => setDrawerOpenId(id);
  const closeDrawer = () => setDrawerOpenId(null);
  const drawerSupplier = drawerOpenId ? suppliers.find(s => s.id === drawerOpenId) : null;

  const handleReset = () => {
    if (window.confirm('Reset all data to the baseline dataset?')) {
      setSuppliers(SUPPLIERS_INIT);
      setRfq(RFQ);
      setSearch('');
      setSortState({ key: 'ddpCostINR', dir: 'asc' });
      setDrawerOpenId(null);
      setExpandedTile(null);
    }
  };

  const handleExport = () => {
    const payload = {
      rfq: rfq,
      suppliers: suppliers,
      settings: { currency, capUnit, activeTab, toggles, sortState, mode },
      generatedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${rfq.id}-market-intel-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div className="app">
      <TopBar
        currency={currency} setCurrency={setCurrency}
        capUnit={capUnit} setCapUnit={setCapUnit}
        onExport={handleExport} onReset={handleReset}
        mode={mode}
        rfq={rfq}
        onOpenSidebar={() => setSidebarOpen(true)}
      />
      <TabNav active={activeTab} setActive={setActiveTab} counts={counts} />
      {activeTab === 'details' && (
        <ControlsBar
          toggles={toggles} setToggles={setToggles}
          search={search} setSearch={setSearch}
          count={filtered.length} total={suppliers.length}
        />
      )}
      <main className="main">
        {activeTab === 'overview' ? (
          <MarketIntelOverview
            suppliers={filtered}
            allSuppliers={suppliers}
            rfq={rfq}
            currency={currency}
            mode={mode}
            updateSupplier={updateSupplier}
            openSupplierProfile={openDrawer}
          />
        ) : (
          <SupplierTable
            suppliers={filtered}
            currency={currency}
            capUnit={capUnit}
            toggles={toggles}
            sortState={sortState}
            setSort={setSortState}
            openDrawer={openDrawer}
            drawerOpenId={drawerOpenId}
            mode={mode}
            updateSupplier={updateSupplier}
            rfq={rfq}
          />
        )}
      </main>
      {drawerSupplier && (
        <SupplierProfile
          supplier={drawerSupplier}
          onClose={closeDrawer}
          currency={currency}
          mode={mode}
          updateSupplier={updateSupplier}
          allSuppliers={suppliers}
        />
      )}
      {sidebarOpen && (
        <RfqSidebar
          rfq={rfq} currency={currency} capUnit={capUnit}
          mode={mode} updateRfq={updateRfq}
          onClose={() => setSidebarOpen(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
