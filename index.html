/* ================================================================
   CURRENCY + UNIT CONVERSION + FORMATTERS
================================================================= */
// Snapshot rates against INR (May 2026 reference, approximate).
const FX = {
  INR: 1,
  USD: 1 / 83.5,
  EUR: 1 / 90.2,
  GBP: 1 / 105.8
};
const CURRENCY_SYMBOL = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };

const convert = (inr, currency) => inr * (FX[currency] || 1);

const fmtMoney = (inr, currency, opts = {}) => {
  if (inr == null || isNaN(inr)) return '—';
  const v = convert(inr, currency);
  const sym = CURRENCY_SYMBOL[currency] || '';
  if (currency === 'INR') {
    if (opts.compact !== false) {
      if (v >= 10000000) return `${sym}${(v/10000000).toFixed(2)} Cr`;
      if (v >= 100000)   return `${sym}${(v/100000).toFixed(2)} L`;
      if (v >= 1000)     return `${sym}${(v/1000).toFixed(0)}k`;
    }
    return `${sym}${Math.round(v).toLocaleString('en-IN')}`;
  }
  if (opts.compact !== false) {
    if (v >= 1000000) return `${sym}${(v/1000000).toFixed(2)}M`;
    if (v >= 1000)    return `${sym}${(v/1000).toFixed(1)}k`;
  }
  return `${sym}${Math.round(v).toLocaleString('en-US')}`;
};

// Capacity unit conversions (base = L)
const CAPACITY = {
  L:   { fromL: v => v,           sym: 'L',   label: 'litres' },
  KL:  { fromL: v => v / 1000,    sym: 'KL',  label: 'kilolitres' },
  Gal: { fromL: v => v / 3.78541, sym: 'US gal', label: 'US gallons' }
};
const fmtCapacity = (litres, unit) => {
  if (litres == null) return '—';
  const cfg = CAPACITY[unit] || CAPACITY.L;
  const v = cfg.fromL(litres);
  return `${v.toLocaleString('en-US', { maximumFractionDigits: unit === 'L' ? 0 : 1 })} ${cfg.sym}`;
};

// Flag emoji from ISO-2 country code
const flagEmoji = (cc) => {
  if (!cc || cc.length !== 2) return '🏳️';
  const codePoints = cc.toUpperCase().split('').map(c => 127397 + c.charCodeAt(0));
  return String.fromCodePoint(...codePoints);
};

// Sort helper for table columns
const sortBy = (arr, key, dir = 'asc') => {
  const mult = dir === 'asc' ? 1 : -1;
  return [...arr].sort((a, b) => {
    const av = a[key], bv = b[key];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;   // nulls last
    if (bv == null) return -1;
    if (typeof av === 'number') return (av - bv) * mult;
    return String(av).localeCompare(String(bv)) * mult;
  });
};

function Match({ level, detail, kind = 'spec' }) {
  const cls = {
    Strong: 'strong', Medium: 'medium', Weak: 'weak', None: 'none'
  }[level] || 'none';
  const icon = { Strong: '✓', Medium: '!', Weak: '✕', None: '–' }[level] || '–';
  return (
    <div className="match-stack">
      <span className={`match ${cls}`}>
        <span className="icon">{icon}</span>
        {level === 'None' ? '—' : level}
      </span>
      {detail && <span className="sub">{detail}</span>}
    </div>
  );
}

function CostBar({ ddpINR, quotedINR, maxINR, currency, showLabel = true }) {
  if (ddpINR == null) {
    return <span style={{color: 'var(--text-tertiary)', fontSize: '11px'}}>— no quote</span>;
  }
  const ddpPct = Math.min(100, (ddpINR / maxINR) * 100);
  const quotedPct = quotedINR != null ? Math.min(100, (quotedINR / maxINR) * 100) : null;
  return (
    <div className="cost-bar">
      <div className="bar-fill" style={{ width: `${ddpPct}%` }}></div>
      {quotedPct != null && <div className="quoted-marker" style={{ left: `${quotedPct}%` }}></div>}
      {showLabel && <span className="ddp-label">{fmtMoney(ddpINR, currency)}</span>}
    </div>
  );
}

// CostBand — shows a market-estimate range (low–high) as a band on a track.
function CostBand({ low, high, maxHigh, currency }) {
  if (low == null || high == null) {
    return <span style={{color: 'var(--text-tertiary)', fontSize: '11px'}}>— no estimate</span>;
  }
  const lowPct  = Math.min(100, (low  / maxHigh) * 100);
  const highPct = Math.min(100, (high / maxHigh) * 100);
  return (
    <div className="cost-band">
      <div className="cost-band-track">
        <div className="cost-band-fill" style={{ left: `${lowPct}%`, width: `${Math.max(2, highPct - lowPct)}%` }}></div>
        <div className="cost-band-cap low"  style={{ left: `${lowPct}%`  }}></div>
        <div className="cost-band-cap high" style={{ left: `${highPct}%` }}></div>
      </div>
      <div className="cost-band-label">
        <span>{fmtMoney(low, currency)}</span>
        <span style={{color: 'var(--text-tertiary)', margin: '0 4px'}}>–</span>
        <span>{fmtMoney(high, currency)}</span>
      </div>
    </div>
  );
}

/* ================================================================
   EDITABLE WRAPPERS — render as plain text in 'presenter' mode,
   transparent inputs in 'editor' mode (look identical until hover/focus)
================================================================= */
function EditableText({ value, onChange, mode, className, style, multiline, placeholder, inline }) {
  const [local, setLocal] = useState(value ?? '');
  useEffect(() => { setLocal(value ?? ''); }, [value]);
  if (mode !== 'editor') {
    return <span className={className} style={style}>{value || placeholder || <span style={{color: 'var(--text-tertiary)'}}>—</span>}</span>;
  }
  const Tag = multiline ? 'textarea' : 'input';
  return (
    <Tag
      className={`editable ${inline ? 'inline' : ''} ${className || ''}`}
      style={style}
      value={local}
      placeholder={placeholder || '—'}
      onChange={e => setLocal(e.target.value)}
      onBlur={() => { if (local !== (value ?? '')) onChange(local); }}
      rows={multiline ? 2 : undefined}
    />
  );
}

function EditableNumber({ value, onChange, mode, format, className, style, suffix, inline }) {
  const [local, setLocal] = useState(value == null ? '' : String(value));
  useEffect(() => { setLocal(value == null ? '' : String(value)); }, [value]);
  if (mode !== 'editor') {
    return <span className={className} style={style}>{format ? format(value) : (value == null ? '—' : value)}</span>;
  }
  return (
    <span style={{display: 'inline-flex', alignItems: 'baseline', gap: '4px'}}>
      <input
        type="text"
        className={`editable num ${inline ? 'inline' : ''} ${className || ''}`}
        style={style}
        value={local}
        onChange={e => setLocal(e.target.value)}
        onBlur={() => {
          if (local === '' || local === '—') { onChange(null); return; }
          const n = Number(local.replace(/[, ]/g, ''));
          if (!isNaN(n)) onChange(n);
          else setLocal(value == null ? '' : String(value));
        }}
      />
      {suffix && <span style={{color: 'var(--text-tertiary)', fontSize: '10.5px', fontFamily: 'var(--font-mono)'}}>{suffix}</span>}
    </span>
  );
}

function EditableSelect({ value, options, onChange, mode, className, style, render }) {
  if (mode !== 'editor') {
    return <span className={className} style={style}>{render ? render(value) : value}</span>;
  }
  return (
    <select
      className={`editable ${className || ''}`}
      style={style}
      value={value || ''}
      onChange={e => onChange(e.target.value)}
    >
      {options.map(o => (

   SUPPLIER TABLE
   - Column set varies by active tab (Overview/Pricing/Specs/Suppliers/All)

================================================================= */

// Column definitions keyed by id; tabs pick the set they show.
const COLUMN_DEFS = {
  select:    { label: '', minWidth: 36, align: 'left' },
  expand:    { label: '', minWidth: 22, align: 'left' },
  star:      { label: '', minWidth: 26, align: 'left' },
  supplier:  { label: 'Supplier', minWidth: 240, sortKey: 'name' },
  type:      { label: 'Type', minWidth: 110, sortKey: 'type' },
  location:  { label: 'Mfg location', minWidth: 140 },
  ddpRange:  { label: 'Est. landed cost (DDP)', minWidth: 220, sortKey: 'ddpCostINR' },
  leadTime:  { label: 'Typical lead time', minWidth: 150, sortKey: 'leadTimeLowWk' },
  specMatch: { label: 'Spec fit', minWidth: 140, sortKey: 'specMatch' },
  certMatch: { label: 'Cert fit', minWidth: 140, sortKey: 'certMatch' },
  confidence:{ label: 'Data confidence', minWidth: 120, sortKey: 'confidence' }
};

// Single column set for the Detailed Overview table; visibility driven by toggles.
const DETAIL_COLUMNS_ALL = [
  'select', 'expand', 'star', 'supplier', 'type', 'location',
  'ddpRange', 'leadTime', 'specMatch', 'certMatch', 'confidence'
];
function buildDetailCols(toggles) {
  return DETAIL_COLUMNS_ALL.filter(c => {
    if (c === 'location'   && !toggles.locations)  return false;
    if (c === 'confidence' && !toggles.confidence) return false;
    return true;
  });
}

function SortTh({ col, sortState, setSort }) {
  const def = COLUMN_DEFS[col];
  const sortable = !!def.sortKey;
  const sorted = sortState.key === def.sortKey;
  return (
    <th
      style={{ minWidth: def.minWidth }}
      className={`${def.align === 'right' ? 'text-right' : ''} ${sorted ? 'sorted' : ''}`}
    >
      {sortable ? (
        <span className="th-inner" onClick={() => setSort({ key: def.sortKey, dir: sorted && sortState.dir === 'asc' ? 'desc' : 'asc' })}>
          {def.label}
          <span className="sort">{sorted ? (sortState.dir === 'asc' ? I.sortAsc() : I.sortDesc()) : I.sort()}</span>
        </span>
      ) : (
        <span>{def.label}</span>
      )}
    </th>
  );
}

            <td key={c}>

/* ================================================================
   COMPARISON DRAWER — side-by-side RFQ vs Supplier offers
================================================================= */

function PropertyRange({ prop, requestedValue, supplierValue, mode, onChange }) {
  // Show a Min/Target/Max axis with the marker positioned by value.
  // Min/Target/Max are the RFQ acceptable range; supplier value is plotted onto same axis,
  // and if outside [min, max], it's drawn at the edge with a warning marker.
  const range = prop.max - prop.min;
  const pct = v => {
    if (v == null) return null;
    const clamped = Math.max(prop.min, Math.min(prop.max, v));
    return ((clamped - prop.min) / range) * 100;
  };
  const supPct = pct(supplierValue);
  // Color for supplier mark
  const supMarkClass = supplierValue == null ? 'bad' :
    supplierValue >= prop.min && supplierValue <= prop.max ? 'ok' :
    Math.abs(supplierValue - prop.target) <= range * 0.3 ? 'warn' : 'bad';
  return (
    <>
      <div className="prop-row-label">
        <span className="ico">◆</span>
        {prop.label}
      </div>
      {/* Requested cell */}
      <div className="prop-cell requested">
        <div className="val">{prop.min} – {prop.max} {prop.unit}</div>
        <div className="range-track">
          <div className="range-fill" style={{ left: '0%', right: '0%' }}></div>
          <div className="tick" style={{ left: '0%' }}></div>
          <div className="tick" style={{ left: '50%' }}></div>
          <div className="tick" style={{ left: '100%' }}></div>
          <div className="marker" style={{ left: `${pct(prop.target)}%` }}></div>
        </div>
        <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '9px', color: 'var(--text-tertiary)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>
          <span>Min {prop.min}</span>
          <span>Target {prop.target}</span>
          <span>Max {prop.max}</span>
        </div>
      </div>
      {/* Supplier cell */}
      <div className="prop-cell">
        <div className="val">
          {mode === 'editor' ? (
            <EditableNumber mode={mode} value={supplierValue} onChange={onChange} suffix={prop.unit} inline />
          ) : supplierValue == null ? (
            <span style={{color: 'var(--text-tertiary)'}}>not specified</span>
          ) : `${supplierValue} ${prop.unit}`}
          {supplierValue != null && supplierValue >= prop.min && supplierValue <= prop.max && (
            <span style={{color: 'var(--success)', marginLeft: '8px', fontSize: '11px', fontFamily: 'var(--font-sans)'}}>✓ within range</span>
          )}
          {supplierValue != null && (supplierValue < prop.min || supplierValue > prop.max) && (
            <span style={{color: 'var(--warning)', marginLeft: '8px', fontSize: '11px', fontFamily: 'var(--font-sans)'}}>! outside range</span>
          )}
        </div>
        <div className="range-track">
          <div className="tick" style={{ left: '0%' }}></div>
          <div className="tick" style={{ left: '50%' }}></div>
          <div className="tick" style={{ left: '100%' }}></div>
          {supPct != null && <div className={`marker ${supMarkClass}`} style={{ left: `${supPct}%` }}></div>}
        </div>
        <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '9px', color: 'var(--text-tertiary)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>
          <span>{prop.min}</span>
          <span>{prop.target}</span>
          <span>{prop.max}</span>
        </div>
      </div>
    </>
  );
}

function SupplierProfile({ supplier, onClose, currency, mode, updateSupplier, allSuppliers }) {
  if (!supplier) return null;
  const s = supplier;

  // Compute market positioning vs peers (price + lead time)
  const peers = (allSuppliers || []).filter(x => x.ddpLowINR != null && !x.isPlaceholder);
  const peerMids = peers.map(x => (x.ddpLowINR + x.ddpHighINR) / 2).sort((a, b) => a - b);
  const ourMid = s.ddpLowINR != null ? (s.ddpLowINR + s.ddpHighINR) / 2 : null;
  const priceRank = ourMid != null ? peerMids.findIndex(v => v >= ourMid) + 1 : null;
  const priceQuartile = ourMid != null ? Math.ceil((priceRank / peerMids.length) * 4) : null;
  const peerLts = peers.map(x => (x.leadTimeLowWk + x.leadTimeHighWk) / 2).sort((a, b) => a - b);
  const ourLt = s.leadTimeLowWk != null ? (s.leadTimeLowWk + s.leadTimeHighWk) / 2 : null;
  const ltRank = ourLt != null ? peerLts.findIndex(v => v >= ourLt) + 1 : null;

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const Section = ({ title, children }) => (
    <div style={{marginBottom: 22}}>
      <h3 style={{fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#8B95A7', fontWeight: 700, margin: '0 0 10px', paddingBottom: 6, borderBottom: '1px solid #EFECE3'}}>{title}</h3>
      {children}
    </div>
  );
  const Field = ({ k, children, mono }) => (
    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '6px 0', gap: 16, borderBottom: '1px dashed #EFECE3'}}>
      <span style={{fontSize: 11, color: '#677488', flexShrink: 0}}>{k}</span>
      <span style={{fontSize: 12, color: '#1A2540', textAlign: 'right', fontFamily: mono ? 'var(--font-mono)' : 'inherit', fontWeight: mono ? 600 : 500}}>{children}</span>
    </div>
  );

  return (
    <>
      <div className="profile-backdrop" onClick={onClose}></div>
      <aside className="profile-drawer" onClick={e => e.stopPropagation()}>
        <header className="profile-head">
          <div style={{display: 'flex', alignItems: 'center', gap: 12, flex: 1, minWidth: 0}}>
            <span className="profile-logo">{s.logoTxt}</span>
            <div style={{flex: 1, minWidth: 0}}>
              <div style={{fontSize: 16, fontWeight: 700, color: '#1A2540', letterSpacing: '-0.01em', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>{s.name}</div>
              <div style={{fontSize: 11, color: '#677488', marginTop: 3, display: 'flex', alignItems: 'center', gap: 6}}>
                <span style={{fontSize: 14}}>{flagEmoji(s.countryCode)}</span>
                {s.city}, {s.country}
                <span style={{color: '#C8C4BA'}}>·</span>
                <span className={`pill-mini ${s.verified ? 'verified' : ''}`} style={{fontSize: 9}}>{s.type}</span>
              </div>
            </div>
          </div>
          <button className="profile-close" onClick={onClose}>{I.close()}</button>
        </header>

        <div className="profile-body">
          {/* Key metrics row */}
          <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginBottom: 22}}>
            <div className="profile-stat">
              <div className="lbl">Est. DDP range</div>
              <div className="val green">{s.ddpLowINR != null ? `${fmtMoney(s.ddpLowINR, currency)} – ${fmtMoney(s.ddpHighINR, currency)}` : '—'}</div>
              {priceQuartile != null && (
                <div className="sub">Q{priceQuartile} of market · rank #{priceRank}</div>
              )}
            </div>
            <div className="profile-stat">
              <div className="lbl">Lead time</div>
              <div className="val">{s.leadTimeLowWk != null ? `${s.leadTimeLowWk}–${s.leadTimeHighWk} wk` : '—'}</div>
              {ltRank != null && (
                <div className="sub">rank #{ltRank} of {peerLts.length}</div>
              )}
            </div>
            <div className="profile-stat">
              <div className="lbl">Tank technology</div>
              <div className="val info" style={{fontSize: 14}}>{s.tankTech || '—'}</div>
              <div className="sub">type: {s.type}</div>
            </div>
          </div>

          <Section title="Company profile">
            <Field k="Manufacturing site">{s.city}, {s.country}</Field>
            <Field k="Region">{s.region}</Field>
            <Field k="Type">{s.type}</Field>
            <Field k="Verification">{s.verified ? 'Verified entity' : 'Unverified — placeholder'}</Field>
            <Field k="Data confidence">
              <span className={`pill-mini ${s.confidence === 'High' ? 'verified' : s.confidence === 'Low' ? 'placeholder' : ''}`}>{s.confidence}</span>
            </Field>
          </Section>

          <Section title="Product offering">
            <Field k="Product code" mono>
              {s.productUrl ? (
                <a href={s.productUrl} target="_blank" rel="noopener noreferrer" style={{color: '#2B5A9C', textDecoration: 'none'}}>{s.productCode} ↗</a>
              ) : s.productCode}
            </Field>
            <Field k="Address">{s.address}</Field>
          </Section>

          <Section title="Market position">
            <Field k="Spec fit">
              <span className={`match-pill ${s.specMatch.toLowerCase()}`}>{s.specMatch}</span>
              {s.specCount && <span style={{color: '#677488', marginLeft: 8, fontSize: 11}}>{s.specCount.met} of {s.specCount.total} met{s.specCount.partial ? `, ${s.specCount.partial} partial` : ''}</span>}
            </Field>
            <Field k="Cert fit">
              <span className={`match-pill ${s.certMatch.toLowerCase()}`}>{s.certMatch}</span>
              {s.certCount && <span style={{color: '#677488', marginLeft: 8, fontSize: 11}}>{s.certCount.met} of {s.certCount.total} held</span>}
            </Field>
          </Section>

          {s.offers && s.offers.certs && (
            <Section title="Regulatory profile">
              {Object.entries(s.offers.certs).map(([k, v]) => (
                <div key={k} style={{display: 'flex', justifyContent: 'space-between', padding: '5px 0', fontSize: 11.5}}>
                  <span style={{color: '#1A2540', textTransform: 'uppercase', letterSpacing: '0.04em'}}>{k}</span>
                  <span style={{color: v ? '#1F8C3C' : '#DC2626', fontWeight: 600}}>{v ? '✓ Held' : '✕ Not stated'}</span>
                </div>
              ))}
            </Section>
          )}

          {s.sourceUrl && (
            <Section title="Sources">
              <Field k="Reference">
                <a href={s.sourceUrl} target="_blank" rel="noopener noreferrer" style={{color: '#2B5A9C', textDecoration: 'none', fontSize: 11}}>{s.source || 'View source ↗'}</a>
              </Field>
            </Section>
          )}
        </div>
      </aside>
    </>
  );
}

function LeafletMap({ suppliers, rfq, currency }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current) return;
    // Wait for Leaflet to be loaded (CDN script)
    const tryInit = () => {
      if (typeof window.L === 'undefined') {
        setTimeout(tryInit, 60);
        return;
      }
      const L = window.L;
      // teardown if already exists (deps change)
      if (mapRef.current) {
        mapRef.current.remove();
        mapRef.current = null;
      }
      const map = L.map(containerRef.current, {
        center: [22, 70],
        zoom: 3,
        minZoom: 2,
        maxBounds: [[-75, -180], [85, 180]],
        maxBoundsViscosity: 1.0,
        worldCopyJump: false,
        zoomControl: true,
        attributionControl: true,
        scrollWheelZoom: false
      });
      mapRef.current = map;
      // Dark "matter" tiles from Carto — Bloomberg-style aesthetic
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19,
        minZoom: 2,
        noWrap: true,
        bounds: [[-90, -180], [90, 180]],
        attribution: '&copy; OpenStreetMap &copy; CARTO'
      }).addTo(map);

      const fmtINR = (v) => {
        if (v == null) return '—';
        if (v >= 1e7) return '₹' + (v/1e7).toFixed(2) + ' Cr';
        if (v >= 1e5) return '₹' + (v/1e5).toFixed(2) + ' L';
        if (v >= 1e3) return '₹' + (v/1e3).toFixed(0) + 'k';
        return '₹' + v;
      };

      // Supplier markers
      suppliers.forEach(s => {
        if (s.lat == null || s.lng == null) return;
        const klass = s.isPlaceholder ? 'dim' : 'verified';
        const icon = L.divIcon({
          className: '',
          html: `<div class="mp-marker-pulse ${klass}"></div>`,
          iconSize: [14, 14],
          iconAnchor: [7, 7],
          popupAnchor: [0, -8]
        });
        const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
        const savings = (s.ddpCostINR != null && s.quotedPriceINR != null) ? (s.ddpCostINR - s.quotedPriceINR) : null;
        const popup = `
          <div class="mp-pop-head">
            <span class="mp-pop-logo ${s.verified ? '' : 'dim'}">${s.logoTxt}</span>
            <div>
              <div class="mp-pop-name">${s.name}</div>
              <div class="mp-pop-code">${s.productCode}</div>
            </div>
          </div>
          <div class="mp-pop-body">
            <div class="mp-pop-row"><span>Location</span><span class="val">${s.city}, ${s.country}</span></div>
            <div class="mp-pop-row"><span>Type</span><span class="val">${s.type} · ${s.confidence}</span></div>
            <div class="mp-pop-row"><span>Status</span><span class="val">${s.status}</span></div>
            ${s.quotedPriceINR != null ? `<div class="mp-pop-row"><span>Quoted</span><span class="val lime">${fmtINR(s.quotedPriceINR)} ${s.quotedIncoterm}</span></div>` : ''}
            ${s.ddpCostINR != null ? `<div class="mp-pop-row"><span>Est. DDP</span><span class="val">${fmtINR(s.ddpCostINR)}</span></div>` : ''}
            ${savings != null ? `<div class="mp-pop-row"><span>Est. savings</span><span class="val lime">${savings >= 0 ? '+' : '−'}${fmtINR(Math.abs(savings))}</span></div>` : ''}
            <div class="mp-pop-row"><span>Spec match</span><span class="val">${s.specMatch} (${s.specCount.met}/${s.specCount.total})</span></div>
            <div class="mp-pop-row"><span>Cert match</span><span class="val">${s.certMatch} (${s.certCount.met}/${s.certCount.total})</span></div>
          </div>
          ${(s.productUrl || s.sourceUrl) ? `
          <div class="mp-pop-foot">
            ${s.productUrl ? `<a href="${s.productUrl}" target="_blank" rel="noopener">Product page ↗</a>` : ''}
            ${s.sourceUrl ? `<a href="${s.sourceUrl}" target="_blank" rel="noopener">Source ↗</a>` : ''}
          </div>` : ''}
        `;
        m.bindPopup(popup, { maxWidth: 320, minWidth: 260, closeButton: true });
      });

      // Client (HMEL delivery) marker — distinct color
      const clientPos = (rfq.delivery.lat != null && rfq.delivery.lng != null)
        ? [rfq.delivery.lat, rfq.delivery.lng] : null;
      if (clientPos) {
        const clientIcon = L.divIcon({
          className: '',
          html: '<div class="mp-marker-pulse client"></div>',
          iconSize: [16, 16],
          iconAnchor: [8, 8],
          popupAnchor: [0, -10]
        });
        const cm = L.marker(clientPos, { icon: clientIcon }).addTo(map);
        cm.bindPopup(`
          <div class="mp-pop-head">
            <span class="mp-pop-logo" style="background: var(--info); color: white">▼</span>
            <div>
              <div class="mp-pop-name">HMEL · Delivery point</div>
              <div class="mp-pop-code">${rfq.delivery.incoterm} · ${rfq.delivery.city}, ${rfq.delivery.countryCode}</div>
            </div>
          </div>
          <div class="mp-pop-body">
            <div class="mp-pop-row"><span>Required by</span><span class="val">${rfq.requiredBy}</span></div>
            <div class="mp-pop-row"><span>Target price</span><span class="val lime">${fmtINR(rfq.targetPriceINR)}</span></div>
            <div class="mp-pop-row"><span>Quantity</span><span class="val">${rfq.quantity} unit, ${rfq.capacity/1000} KL</span></div>
          </div>
        `, { maxWidth: 300, minWidth: 240 });
      }

      // Fit bounds to all markers so the user sees everyone at once
      const allPoints = suppliers
        .filter(s => s.lat != null && s.lng != null)
        .map(s => [s.lat, s.lng]);
      if (clientPos) allPoints.push(clientPos);
      if (allPoints.length >= 2) {
        map.fitBounds(L.latLngBounds(allPoints), { padding: [40, 40], maxZoom: 5 });
      } else if (allPoints.length === 1) {
        map.setView(allPoints[0], 5);
      }
    };
    tryInit();

    return () => {
      if (mapRef.current) {
        mapRef.current.remove();
        mapRef.current = null;
      }
    };
  }, [suppliers, rfq]);

  return <div ref={containerRef} className="leaflet-map" />;
}


/* ================================================================
   HOVER TIP — shared tooltip utility used across charts
================================================================= */
function HoverTip({ data }) {
  if (!data || !data.visible) return null;
  const { x, y, title, rows, accent } = data;
  // Position tooltip near cursor, but flip to left/up edge if it would overflow
  const tipWidth = 240;
  const tipMaxHeight = 200;
  const left = (x + tipWidth + 20 > window.innerWidth) ? x - tipWidth - 14 : x + 14;
  const top  = (y + tipMaxHeight + 20 > window.innerHeight) ? y - tipMaxHeight - 14 : y + 14;
  return (
    <div className="hover-tip" style={{ left, top, borderLeftColor: accent || 'var(--border-strong)', borderLeftWidth: accent ? '3px' : '1px' }}>
      {title && <div className="tip-title">{title}</div>}
      {rows && rows.map((r, i) => (
        <div className="tip-row" key={i}>
          <span>{r.k}</span>
          <span className={`v ${r.cls || ''}`}>{r.v}</span>
        </div>
      ))}
    </div>
  );
}

/* ================================================================
   MARKET PRICE BAND — scatter of supplier price ranges on a market spectrum
================================================================= */
function MarketPriceBand({ suppliers, currency, onHover, expanded }) {
  const valued = suppliers.filter(s => s.ddpLowINR != null && s.ddpHighINR != null);
  if (valued.length === 0) {
    return <div className="empty">No price data available.</div>;
  }
  const allLows = valued.map(s => s.ddpLowINR);
  const allHighs = valued.map(s => s.ddpHighINR);
  const minV = Math.min(...allLows) * 0.95;
  const maxV = Math.max(...allHighs) * 1.05;

  // Market band stops: market low, median midpoints, market high
  const mids = valued.map(s => (s.ddpLowINR + s.ddpHighINR) / 2).sort((a,b) => a - b);
  const median = mids[Math.floor(mids.length / 2)];
  const q1     = mids[Math.floor(mids.length / 4)];
  const q3     = mids[Math.floor(mids.length * 3 / 4)];

  const pct = v => ((v - minV) / (maxV - minV)) * 100;

  const handleMove = (s, ev) => {
    if (!onHover) return;
    const isDom = s.countryCode === 'IN';
    onHover({
      visible: true,
      x: ev.clientX, y: ev.clientY,
      title: <span>{s.name}<span style={{fontSize:'9.5px', color:'var(--text-tertiary)', marginLeft:'6px', letterSpacing:'0.06em', textTransform:'uppercase'}}>{isDom ? 'domestic' : 'import'}</span></span>,
      accent: isDom ? 'var(--lime)' : 'var(--info)',
      rows: [
        { k: 'Tech', v: s.tankTech || '—' },
        { k: 'Location', v: `${s.city}, ${s.countryCode}` },
        { k: 'Price range', v: `${fmtMoney(s.ddpLowINR, currency)} – ${fmtMoney(s.ddpHighINR, currency)}`, cls: 'lime' },
        { k: 'Mid-point', v: fmtMoney((s.ddpLowINR + s.ddpHighINR)/2, currency) },
        { k: 'Lead time', v: s.leadTimeLowWk != null ? `${s.leadTimeLowWk}–${s.leadTimeHighWk} wk` : '—' },
        { k: 'Confidence', v: s.confidence }
      ]
    });
  };
  const handleLeave = () => onHover && onHover({ visible: false });

  return (
    <div className="price-rangebar">
      <div className="stops">
        <div className="stop-line"></div>
        <div className="stop-pt" style={{left: `${pct(Math.min(...allLows))}%`}} data-label="Market low"  data-value={fmtMoney(Math.min(...allLows), currency)}></div>
        <div className="stop-pt" style={{left: `${pct(median)}%`}}                 data-label="Median"       data-value={fmtMoney(median, currency)}></div>
        <div className="stop-pt" style={{left: `${pct(Math.max(...allHighs))}%`}} data-label="Market high" data-value={fmtMoney(Math.max(...allHighs), currency)}></div>
      </div>
      <div className="scatter">
        {valued.map(s => {
          const mid = (s.ddpLowINR + s.ddpHighINR) / 2;
          return (
            <div
              key={s.id}
              className={`scatter-pt ${s.countryCode === 'IN' ? 'dom' : 'imp'}`}
              style={{left: `${pct(mid)}%`}}
              onMouseMove={ev => handleMove(s, ev)}
              onMouseLeave={handleLeave}
              title={s.name}
            ></div>
          );
        })}
      </div>
      <div style={{display: 'flex', justifyContent: 'space-between', marginTop: '24px', fontSize: '10.5px', color: 'var(--text-tertiary)'}}>
        <span><span style={{display:'inline-block', width:'8px', height:'8px', borderRadius:'50%', background:'var(--lime)', marginRight:'5px', verticalAlign:'middle'}}></span>Domestic ({valued.filter(s => s.countryCode === 'IN').length})</span>
        <span><span style={{display:'inline-block', width:'8px', height:'8px', borderRadius:'50%', background:'var(--info)', marginRight:'5px', verticalAlign:'middle'}}></span>Import ({valued.filter(s => s.countryCode !== 'IN').length})</span>
        <span style={{color:'var(--lime)', fontWeight:600}}>Median: {fmtMoney(median, currency)}</span>
      </div>
      {expanded && (
        <div style={{marginTop: '24px', paddingTop: '20px', borderTop: '1px solid var(--border-faint)'}}>
          <h4 style={{fontSize: '10px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-tertiary)', margin: '0 0 12px', fontWeight: 700}}>Quartile breakdown</h4>
          <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '12px', fontSize: '11px'}}>
            <div><div style={{color:'var(--text-tertiary)', fontSize: '10px', letterSpacing: '0.06em', textTransform:'uppercase'}}>Q1 (25th)</div><div style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'14px', color:'var(--success)'}}>{fmtMoney(q1, currency)}</div></div>
            <div><div style={{color:'var(--text-tertiary)', fontSize: '10px', letterSpacing: '0.06em', textTransform:'uppercase'}}>Median</div><div style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'14px', color:'var(--lime)'}}>{fmtMoney(median, currency)}</div></div>
            <div><div style={{color:'var(--text-tertiary)', fontSize: '10px', letterSpacing: '0.06em', textTransform:'uppercase'}}>Q3 (75th)</div><div style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'14px', color:'var(--warning)'}}>{fmtMoney(q3, currency)}</div></div>
            <div><div style={{color:'var(--text-tertiary)', fontSize: '10px', letterSpacing: '0.06em', textTransform:'uppercase'}}>Range</div><div style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'14px'}}>{fmtMoney(Math.max(...allHighs) - Math.min(...allLows), currency)}</div></div>
          </div>
          <h4 style={{fontSize: '10px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-tertiary)', margin: '24px 0 12px', fontWeight: 700}}>Suppliers by price (ascending)</h4>
          <div style={{display: 'grid', gridTemplateColumns: '1fr 110px 110px 120px 70px', gap: '6px 14px', fontSize: '11px'}}>
            <div style={{fontSize: '9.5px', color: 'var(--text-tertiary)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>Supplier</div>
            <div style={{fontSize: '9.5px', color: 'var(--text-tertiary)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>Low</div>
            <div style={{fontSize: '9.5px', color: 'var(--text-tertiary)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>Mid</div>
            <div style={{fontSize: '9.5px', color: 'var(--text-tertiary)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>High</div>
            <div style={{fontSize: '9.5px', color: 'var(--text-tertiary)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>Source</div>
            {[...valued].sort((a,b) => ((a.ddpLowINR+a.ddpHighINR)/2) - ((b.ddpLowINR+b.ddpHighINR)/2)).map(s => (
              <React.Fragment key={s.id}>
                <div style={{padding: '4px 0', borderTop: '1px dashed var(--border-faint)'}}>
                  <span style={{fontSize: '11px', marginRight: '5px'}}>{flagEmoji(s.countryCode)}</span>
                  {s.name}
                </div>
                <div style={{fontFamily: 'var(--font-mono)', padding: '4px 0', borderTop: '1px dashed var(--border-faint)'}}>{fmtMoney(s.ddpLowINR, currency)}</div>
                <div style={{fontFamily: 'var(--font-mono)', padding: '4px 0', borderTop: '1px dashed var(--border-faint)', color: 'var(--lime)'}}>{fmtMoney((s.ddpLowINR + s.ddpHighINR)/2, currency)}</div>
                <div style={{fontFamily: 'var(--font-mono)', padding: '4px 0', borderTop: '1px dashed var(--border-faint)'}}>{fmtMoney(s.ddpHighINR, currency)}</div>
                <div style={{padding: '4px 0', borderTop: '1px dashed var(--border-faint)', fontSize: '10px'}}>
                  {s.countryCode === 'IN' ? <span style={{color:'var(--lime)'}}>domestic</span> : <span style={{color:'var(--info)'}}>import</span>}
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   REG READINESS — % of market that holds each required certification
================================================================= */
function RegReadiness({ suppliers, rfq, onHover, expanded }) {
  const verified = suppliers.filter(s => s.offers && !s.isPlaceholder);
  const totalV = verified.length;
  const rows = rfq.certifications.map(c => {
    const held = verified.filter(s => s.offers.certs[c.key]).length;
    const pct = totalV ? Math.round((held / totalV) * 100) : 0;
    return { ...c, held, total: totalV, pct };
  });
  const handleMove = (r, ev) => {
    if (!onHover) return;
    const holders = verified.filter(s => s.offers.certs[r.key]).map(s => s.name);
    onHover({
      visible: true, x: ev.clientX, y: ev.clientY,
      title: `${r.label} — ${r.mandatory ? 'MANDATORY' : 'preferred'}`,
      accent: r.mandatory ? 'var(--danger)' : 'var(--info)',
      rows: [
        { k: 'Market coverage', v: `${r.held} / ${r.total} verified`, cls: 'lime' },
        { k: 'Coverage rate', v: `${r.pct}%` },
        { k: 'Holders', v: holders.length ? holders.slice(0, 3).join(', ') + (holders.length > 3 ? ` +${holders.length - 3}` : '') : 'none' }
      ]
    });
  };
  const handleLeave = () => onHover && onHover({ visible: false });

  return (
    <div className="reg-rows">
      {rows.map(r => (
        <div className="reg-row" key={r.key}
             onMouseMove={ev => handleMove(r, ev)}
             onMouseLeave={handleLeave}>
          <div className="name">
            {r.label}
            <span className={r.mandatory ? 'mand' : 'pref'}>{r.mandatory ? 'Mandatory' : 'Preferred'}</span>
          </div>
          <div className="pct-track">
            <div className={`pct-fill ${r.pct >= 70 ? 'high' : r.pct >= 40 ? 'med' : 'low'}`} style={{width: `${r.pct}%`}}></div>
          </div>
          <div className="v">{r.pct}<span style={{fontSize:'10px', color:'var(--text-tertiary)'}}>%</span></div>
        </div>
      ))}
      {expanded && (
        <div style={{marginTop: '20px', paddingTop: '20px', borderTop: '1px solid var(--border-faint)'}}>
          <h4 style={{fontSize: '10px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-tertiary)', margin: '0 0 12px', fontWeight: 700}}>Supplier × Certification matrix</h4>
          <div className="heatmap" style={{margin: '0'}}>
            <div className="hm-head">
              <div className="cell">Supplier</div>
              {rfq.certifications.map(c => (
                <div className="cell" key={c.key} title={c.label}>
                  {c.label.split(' ')[0]}
                  <div style={{fontSize: '8.5px', color: c.mandatory ? 'var(--danger)' : 'var(--text-muted)', marginTop: '2px'}}>
                    {c.mandatory ? 'mandatory' : 'preferred'}
                  </div>
                </div>
              ))}
            </div>
            {suppliers.map(s => (
              <div className="hm-row" key={s.id}>
                <div className="hm-name">
                  <span style={{fontSize: '11px'}}>{flagEmoji(s.countryCode)}</span>
                  {s.name}
                </div>
                {rfq.certifications.map(c => {
                  if (!s.offers) return <div className="hm-cell unknown" key={c.key}>?</div>;
                  const held = !!s.offers.certs[c.key];
                  const klass = held ? 'held' : c.mandatory ? 'missing-m' : 'missing-p';
                  const sym = held ? '✓' : c.mandatory ? '✕' : '○';
                  return <div className={`hm-cell ${klass}`} key={c.key} title={`${c.label}: ${held ? 'Held' : c.mandatory ? 'Gap' : 'Not stated'}`}>{sym}</div>;
                })}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   TECH MIX — tank technology distribution across the market
================================================================= */
function TechMix({ suppliers, onHover, expanded }) {
  const counts = {};
  suppliers.forEach(s => { if (s.tankTech) counts[s.tankTech] = (counts[s.tankTech] || 0) + 1; });
  const total = suppliers.length;
  const rows = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const techClass = (name) => {
    if (name.toLowerCase().includes('frp')) return 'frp';
    if (name.toLowerCase().includes('steel')) return 'steel';
    if (name.toLowerCase().includes('composite')) return 'compo';
    return 'other';
  };
  const handleMove = (name, count, ev) => {
    if (!onHover) return;
    const holders = suppliers.filter(s => s.tankTech === name).map(s => s.name);
    onHover({
      visible: true, x: ev.clientX, y: ev.clientY,
      title: name,
      accent: techClass(name) === 'frp' ? 'var(--info)' : techClass(name) === 'compo' ? '#8B5CF6' : 'var(--lime)',
      rows: [
        { k: 'Market share', v: `${Math.round(count/total*100)}%`, cls: 'lime' },
        { k: 'Suppliers', v: `${count} of ${total}` },
        { k: 'Holders', v: holders.slice(0, 3).join(', ') + (holders.length > 3 ? ` +${holders.length - 3}` : '') }
      ]
    });
  };
  const handleLeave = () => onHover && onHover({ visible: false });
  return (
    <div className="tech-list">
      {rows.map(([name, count]) => {
        const pct = (count / total) * 100;
        return (
          <div className="tech-row" key={name}
               onMouseMove={ev => handleMove(name, count, ev)}
               onMouseLeave={handleLeave}>
            <div className="name">{name}</div>
            <div className="bar-wrap">
              <div className={`bar-fill ${techClass(name)}`} style={{width: `${pct}%`}}></div>
            </div>
            <div className="v">{count}</div>
          </div>
        );
      })}
      {expanded && (
        <div style={{marginTop: '20px', paddingTop: '20px', borderTop: '1px solid var(--border-faint)', fontSize: '11px', color: 'var(--text-secondary)', lineHeight: '1.55'}}>
          <h4 style={{fontSize: '10px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-tertiary)', margin: '0 0 10px', fontWeight: 700}}>Technology notes</h4>
          <p style={{margin: '0 0 10px'}}><strong style={{color: 'var(--lime)'}}>Steel DW:</strong> Carbon-steel double-wall, dominant in Indian PSU procurement. Lower upfront cost, well-understood; needs cathodic protection for soil-corrosion mitigation.</p>
          <p style={{margin: '0 0 10px'}}><strong style={{color: 'var(--info)'}}>FRP DW:</strong> Fibreglass-reinforced plastic. Gaining share globally for corrosion resistance and 30-yr warranty. Higher upfront cost; superior in groundwater-sensitive sites.</p>
          <p style={{margin: '0 0 10px'}}><strong style={{color: '#8B5CF6'}}>Composite DW:</strong> Steel inner with FRP outer jacket. Hybrid approach — steel mechanical properties + FRP corrosion protection. Premium pricing.</p>
          <p style={{margin: '0', color: 'var(--text-tertiary)', fontSize: '10.5px', borderLeft: '2px solid var(--lime)', paddingLeft: '10px', marginTop: '14px'}}>
            For HMEL's refinery diesel application, both Steel DW and Composite DW are well-suited; FRP DW preferred only if groundwater table is shallow.
          </p>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   LEAD TIME PROFILE — histogram of supplier lead times across market
================================================================= */
function LeadTimeProfile({ suppliers, onHover, expanded }) {
  // Buckets in weeks
  const buckets = [
    { label: '0-8 wk',  lo: 0,  hi: 8,  k: 'fast' },
    { label: '9-12 wk', lo: 9,  hi: 12, k: 'std' },
    { label: '13-16 wk', lo: 13, hi: 16, k: 'slow' },
    { label: '17+ wk', lo: 17, hi: 99, k: 'long' }
  ];
  buckets.forEach(b => {
    b.count = suppliers.filter(s => s.leadTimeLowWk != null && s.leadTimeLowWk >= b.lo && s.leadTimeLowWk <= b.hi).length;
    b.names = suppliers.filter(s => s.leadTimeLowWk != null && s.leadTimeLowWk >= b.lo && s.leadTimeLowWk <= b.hi).map(s => s.name);
  });
  const maxCount = Math.max(...buckets.map(b => b.count), 1);
  const handleMove = (b, ev) => {
    if (!onHover) return;
    onHover({
      visible: true, x: ev.clientX, y: ev.clientY,
      title: b.label,
      accent: 'var(--lime)',
      rows: [
        { k: 'Suppliers in bucket', v: b.count, cls: 'lime' },
        { k: 'Names', v: b.names.length ? b.names.slice(0, 3).join(', ') + (b.names.length > 3 ? ` +${b.names.length - 3}` : '') : '—' }
      ]
    });
  };
  const handleLeave = () => onHover && onHover({ visible: false });
  return (
    <>
      <div className="lt-hist">
        {buckets.map(b => (
          <div className={`lt-bar-col ${b.count === 0 ? 'dim' : ''}`} key={b.k}
               onMouseMove={ev => handleMove(b, ev)}
               onMouseLeave={handleLeave}>
            <div className="v">{b.count}</div>
            <div className="lt-bar" style={{height: `${Math.max(8, (b.count / maxCount) * 90)}%`}}></div>
            <div className="lbl">{b.label}</div>
          </div>
        ))}
      </div>
      {expanded && (
        <div style={{marginTop: '14px', paddingTop: '14px', borderTop: '1px solid var(--border-faint)', fontSize: '11px', color: 'var(--text-secondary)', lineHeight: '1.55'}}>
          <h4 style={{fontSize: '10px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-tertiary)', margin: '0 0 12px', fontWeight: 700}}>Lead-time profile by supplier</h4>
          {[...suppliers].filter(s => s.leadTimeLowWk != null).sort((a, b) => a.leadTimeLowWk - b.leadTimeLowWk).map(s => (
            <div key={s.id} style={{display: 'grid', gridTemplateColumns: '20px 1fr 120px', gap: '10px', padding: '7px 0', borderBottom: '1px dashed var(--border-faint)', alignItems: 'center'}}>
              <span style={{fontSize: '14px'}}>{flagEmoji(s.countryCode)}</span>
              <span style={{color: 'var(--text-primary)'}}>{s.name}</span>
              <span style={{fontFamily: 'var(--font-mono)', textAlign: 'right', color: 'var(--text-primary)', fontWeight: 600}}>{s.leadTimeLowWk}–{s.leadTimeHighWk} weeks</span>
            </div>
          ))}
          <p style={{margin: '14px 0 0', color: 'var(--text-tertiary)', fontSize: '10.5px', borderLeft: '2px solid var(--info)', paddingLeft: '10px'}}>
            Lead times reflect typical ex-fabricator timelines. Imports add 4–6 wk sea-freight + 1–2 wk port clearance. Domestic suppliers can compress installation by deploying local crews.
          </p>
        </div>
      )}
    </>
  );
}

/* ================================================================
   SUPPLY CONCENTRATION — domestic vs import share + supplier count by country
================================================================= */
function SupplyConcentration({ suppliers, onHover, expanded }) {
  // Group by country
  const byCountry = {};
  suppliers.forEach(s => {
    if (!byCountry[s.country]) byCountry[s.country] = { count: 0, cc: s.countryCode, cities: new Set(), names: [] };
    byCountry[s.country].count++;
    byCountry[s.country].cities.add(s.city);
    byCountry[s.country].names.push(s.name);
  });
  const rows = Object.entries(byCountry).sort((a, b) => b[1].count - a[1].count);
  const total = suppliers.length;

  // Domestic vs import donut
  let domVal = 0, impVal = 0;
  suppliers.forEach(s => {
    if (s.countryCode === 'IN') domVal++; else impVal++;
  });
  const domFrac = total ? domVal / total : 0;
  const r = 38, cx = 50, cy = 50;
  const domAng = domFrac * 2 * Math.PI - Math.PI / 2;
  const startA = -Math.PI / 2;
  const x1d = cx + r * Math.cos(startA), y1d = cy + r * Math.sin(startA);
  const x2d = cx + r * Math.cos(domAng), y2d = cy + r * Math.sin(domAng);
  const largeDom = domFrac > 0.5 ? 1 : 0;

  const handleMove = (country, data, ev) => {
    if (!onHover) return;
    onHover({
      visible: true, x: ev.clientX, y: ev.clientY,
      title: <>{flagEmoji(data.cc)} {country}</>,
      accent: data.cc === 'IN' ? 'var(--lime)' : 'var(--info)',
      rows: [
        { k: 'Suppliers', v: data.count, cls: 'lime' },
        { k: 'Share', v: `${Math.round(data.count/total*100)}%` },
        { k: 'Cities', v: [...data.cities].slice(0, 3).join(' · ') },
        { k: 'Names', v: data.names.slice(0, 2).join(', ') + (data.names.length > 2 ? ` +${data.names.length - 2}` : '') }
      ]
    });
  };
  const handleLeave = () => onHover && onHover({ visible: false });

  return (
    <div style={{display: 'flex', gap: '14px', alignItems: 'flex-start', flexWrap: 'wrap', padding: '4px 0'}}>
      <div style={{flexShrink: 0}}>
        <svg viewBox="0 0 100 100" width="100" height="100">
          <circle cx={cx} cy={cy} r={r} fill="var(--info)" />
          {domFrac > 0 && domFrac < 1 && (
            <path d={`M ${cx} ${cy} L ${x1d} ${y1d} A ${r} ${r} 0 ${largeDom} 1 ${x2d} ${y2d} Z`} fill="var(--lime)" />
          )}
          {domFrac === 1 && <circle cx={cx} cy={cy} r={r} fill="var(--lime)" />}
          <circle cx={cx} cy={cy} r={22} fill="var(--bg-elev-1)" />
          <text x={cx} y={cy-1} textAnchor="middle" style={{fill:'var(--text-primary)', fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'12px'}}>
            {Math.round(domFrac * 100)}%
          </text>
          <text x={cx} y={cy+10} textAnchor="middle" style={{fill:'var(--text-tertiary)', fontSize:'6.5px', letterSpacing:'0.08em'}}>DOM</text>
        </svg>
      </div>
      <div style={{flex: 1, minWidth: '140px'}}>
        {rows.map(([country, data]) => (
          <div key={country}
               onMouseMove={ev => handleMove(country, data, ev)}
               onMouseLeave={handleLeave}
               style={{
                 display: 'grid',
                 gridTemplateColumns: '18px 1fr 28px',
                 gap: '8px',
                 alignItems: 'center',
                 padding: '5px 0',
                 borderBottom: '1px dashed var(--border-faint)',
                 cursor: 'pointer'
               }}>
            <span style={{fontSize: '14px'}}>{flagEmoji(data.cc)}</span>
            <span style={{fontSize: '11.5px', color: 'var(--text-primary)'}}>{country}</span>
            <span style={{fontFamily: 'var(--font-mono)', fontSize: '12px', fontWeight: 700, color: 'var(--text-primary)', textAlign: 'right'}}>{data.count}</span>
          </div>
        ))}
      </div>
      {expanded && (
        <div style={{flexBasis: '100%', marginTop: '14px', paddingTop: '14px', borderTop: '1px solid var(--border-faint)', fontSize: '11px', color: 'var(--text-secondary)', lineHeight: '1.55'}}>
          <p style={{margin: '0', color: 'var(--text-tertiary)', borderLeft: '2px solid var(--warning)', paddingLeft: '10px'}}>
            Import-share carries ~7.5% basic customs duty + 18% IGST and 6–10% sea-freight on CIF value; domestic awards remove all three. Single-country supply concentration above 60% flags as a supply-chain risk.
          </p>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   STRATEGIES PANEL — 3 sourcing-strategy cards (Domestic / Hybrid / Import)
================================================================= */
function StrategiesPanel({ suppliers, currency, rfq }) {
  const dom = suppliers.filter(s => s.countryCode === 'IN' && s.ddpLowINR != null);
  const imp = suppliers.filter(s => s.countryCode !== 'IN' && s.ddpLowINR != null);
  const fmtRange = (arr) => {
    if (arr.length === 0) return '—';
    const lo = Math.min(...arr.map(s => s.ddpLowINR));
    const hi = Math.max(...arr.map(s => s.ddpHighINR));
    return `${fmtMoney(lo, currency)} – ${fmtMoney(hi, currency)}`;
  };
  const fmtLT = (arr) => {
    if (arr.length === 0) return '—';
    const lo = Math.min(...arr.map(s => s.leadTimeLowWk).filter(v => v != null));
    const hi = Math.max(...arr.map(s => s.leadTimeHighWk).filter(v => v != null));
    return `${lo}–${hi} wk`;
  };
  const strategies = [
    {
      badge: 'Lowest risk',
      badgeCls: 'lime',
      title: 'Domestic-led',
      desc: 'Award to one or more India-based players. No FX exposure, no import duties, on-the-ground commissioning support.',
      stats: [
        { k: 'Suppliers', v: dom.length },
        { k: 'Price range', v: fmtRange(dom) },
        { k: 'Lead time', v: fmtLT(dom) }
      ],
      pros: ['No FX risk', 'No customs duties', 'Easier service & spares', 'Likely PESO-ready'],
      cons: ['Smaller pool of choices', 'Tech mix mostly Steel DW', 'Less FRP / composite optionality']
    },
    {
      badge: 'Balanced',
      badgeCls: 'info',
      title: 'Hybrid (1 dom + 1 import)',
      desc: 'Split award between a primary domestic supplier and an import for technical hedging — e.g. 1× Steel DW domestic + 1× FRP DW imported reference unit.',
      stats: [
        { k: 'Suppliers', v: '1 IN + 1 import' },
        { k: 'Price range', v: fmtRange(suppliers.filter(s => s.ddpLowINR != null)) },
        { k: 'Lead time', v: fmtLT(suppliers.filter(s => s.ddpLowINR != null)) }
      ],
      pros: ['Tech diversity (Steel + FRP)', 'Negotiating leverage on both sides', 'Mitigated single-source risk'],
      cons: ['Higher coordination overhead', 'Partial FX exposure', 'Two qualification cycles']
    },
    {
      badge: 'Premium tech',
      badgeCls: 'warn',
      title: 'Import-led',
      desc: 'Award to established import-OEM (US/CA) with proven FRP / composite tech and 30-year warranty. Best for groundwater-sensitive sites.',
      stats: [
        { k: 'Suppliers', v: imp.length },
        { k: 'Price range', v: fmtRange(imp) },
        { k: 'Lead time', v: fmtLT(imp) }
      ],
      pros: ['Best-in-class corrosion warranty', 'FRP / composite mainstream', 'Track record at majors'],
      cons: ['+16–18% customs + GST', 'Sea-freight risk', 'Limited local service network', 'Most lack PESO licence']
    }
  ];
  return (
    <div className="strategy-row">
      {strategies.map((s, i) => (
        <div className="strategy-card" key={i}>
          <span className={`badge ${s.badgeCls}`}>{s.badge}</span>
          <h4>{s.title}</h4>
          <div className="desc">{s.desc}</div>
          <div className="pros-cons">
            <div className="col pro">
              <h5 className="pro">Advantages</h5>
              <ul style={{margin: 0, padding: 0}}>
                {s.pros.map((p, j) => <li key={j}>{p}</li>)}
              </ul>
            </div>
            <div className="col con">
              <h5 className="con">Trade-offs</h5>
              <ul style={{margin: 0, padding: 0}}>
                {s.cons.map((c, j) => <li key={j}>{c}</li>)}
              </ul>
            </div>
          </div>
          <div className="stats">
            {s.stats.map((st, j) => (
              <div className="stat" key={j}>
                <div className="k">{st.k}</div>
                <div className="v">{st.v}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ================================================================
   MARKET INTELLIGENCE OVERVIEW — Valdera-style light-theme dashboard
   • 4 KPI cards · ranked bar lists · light map with overlay
   • Price histogram · lead-time band · trade lanes · scatter
================================================================= */

// Light-theme variant of LeafletMap — Carto light tiles, blue bubble markers.
function LeafletMapLight({ suppliers, rfq, currency, onHoverCountry }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const overlayRef = useRef(null);

  // Aggregate suppliers by country (for bubble sizing)
  const byCountry = {};
  suppliers.forEach(s => {
    if (s.lat == null || s.countryCode === 'IN' && s.isPlaceholder) return;
    if (!byCountry[s.countryCode]) byCountry[s.countryCode] = { count: 0, lat: 0, lng: 0, names: [], country: s.country, cities: new Set() };
    byCountry[s.countryCode].count++;
    byCountry[s.countryCode].lat += s.lat;
    byCountry[s.countryCode].lng += s.lng;
    byCountry[s.countryCode].names.push(s.name);
    byCountry[s.countryCode].cities.add(s.city);
  });
  Object.values(byCountry).forEach(c => {
    c.lat = c.lat / c.count;
    c.lng = c.lng / c.count;
  });

  useEffect(() => {
    if (!containerRef.current) return;
    const tryInit = () => {
      if (typeof window.L === 'undefined') {
        setTimeout(tryInit, 60);
        return;
      }
      const L = window.L;
      if (mapRef.current) {
        mapRef.current.remove();
        mapRef.current = null;
      }
      const map = L.map(containerRef.current, {
        center: [20, 30],
        zoom: 2,
        minZoom: 2,
        maxBounds: [[-75, -180], [85, 180]],
        maxBoundsViscosity: 1.0,
        worldCopyJump: false,
        zoomControl: true,
        attributionControl: true,
        scrollWheelZoom: false
      });
      mapRef.current = map;
      // OpenStreetMap tiles — universally reliable
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        minZoom: 2,
        noWrap: true,
        bounds: [[-90, -180], [90, 180]],
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const maxCount = Math.max(1, ...Object.values(byCountry).map(c => c.count));

      // Country bubbles
      Object.entries(byCountry).forEach(([cc, data]) => {
        const r = 14 + (data.count / maxCount) * 26;  // 14-40px radius
        const isDom = cc === 'IN';
        const icon = L.divIcon({
          className: '',
          html: `<div class="mi-marker ${isDom ? 'dom' : ''}" style="width:${r*2}px;height:${r*2}px"></div>`,
          iconSize: [r*2, r*2],
          iconAnchor: [r, r]
        });
        const m = L.marker([data.lat, data.lng], { icon }).addTo(map);
        m.bindPopup(`
          <div style="padding: 12px 14px; min-width: 200px">
            <div style="font-weight: 600; color: #1A2540; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
              <span style="font-size:16px">${flagEmojiHTML(cc)}</span> ${data.country}
            </div>
            <div style="display: grid; grid-template-columns: 1fr auto; gap: 4px 14px; font-size: 11.5px;">
              <span style="color:#677488">Suppliers</span><span style="font-family: var(--font-mono); font-weight: 600; color: #1A2540; text-align: right">${data.count}</span>
              <span style="color:#677488">Share</span><span style="font-family: var(--font-mono); font-weight: 600; color: #1F4D2A; text-align: right">${Math.round(data.count/suppliers.length * 100)}%</span>
              <span style="color:#677488">Cities</span><span style="font-family: var(--font-mono); font-size: 10.5px; color: #1A2540; text-align: right">${[...data.cities].slice(0,3).join(' · ')}</span>
            </div>
          </div>
        `, { maxWidth: 280, minWidth: 200, closeButton: false });
      });

      // HMEL delivery marker (Noida)
      if (rfq.delivery.lat != null) {
        const ci = L.divIcon({
          className: '',
          html: '<div class="mi-marker client" style="width:14px;height:14px"></div>',
          iconSize: [14, 14],
          iconAnchor: [7, 7]
        });
        const cm = L.marker([rfq.delivery.lat, rfq.delivery.lng], { icon: ci }).addTo(map);
        cm.bindPopup(`
          <div style="padding: 12px 14px; min-width: 200px">
            <div style="font-weight: 600; color: #1A2540; font-size: 13px; margin-bottom: 6px">HMEL · Delivery point</div>
            <div style="font-size: 11.5px; color: #677488">${rfq.delivery.city}, ${rfq.delivery.countryCode} · ${rfq.delivery.incoterm}</div>
          </div>
        `, { closeButton: false });
      }

      // Fit bounds
      const all = Object.values(byCountry).map(c => [c.lat, c.lng]);
      if (rfq.delivery.lat) all.push([rfq.delivery.lat, rfq.delivery.lng]);
      if (all.length >= 2) {
        map.fitBounds(L.latLngBounds(all), { padding: [50, 50], maxZoom: 4 });
      }
    };
    tryInit();
    return () => {
      if (mapRef.current) {
        mapRef.current.remove();
        mapRef.current = null;
      }
    };
  }, [suppliers, rfq]);

  // Top-N country list overlay (lower-left)
  const topCountries = Object.entries(byCountry).sort((a, b) => b[1].count - a[1].count);

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%' }}>
      <div ref={containerRef} className="leaflet-map" />
      {topCountries.length > 0 && (
        <div className="mi-map-overlay" style={{ top: 'auto', bottom: 30, left: 12 }}>

          {topCountries.slice(0, 6).map(([cc, data]) => (
            <div className="mi-map-overlay-row" key={cc}>
              <span style={{fontSize: '13px'}}>{flagEmoji(cc)}</span>
              <span className="cc">{cc}</span>
              <span className="v">{data.count}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Helper: HTML flag emoji string for use inside innerHTML strings
function flagEmojiHTML(cc) {
  if (!cc || cc.length !== 2) return '';
  return cc.toUpperCase().split('').map(c => String.fromCodePoint(127397 + c.charCodeAt(0))).join('');
}

/* === Hover tooltip (white card, Valdera-style) === */
function MITooltip({ data }) {
  if (!data || !data.visible) return null;
  const { x, y, title, rows } = data;
  const W = 240, H = 200;
  const left = (x + W + 24 > window.innerWidth) ? x - W - 16 : x + 16;
  const top  = (y + H + 24 > window.innerHeight) ? y - H - 16 : y + 16;
  return (
    <div className="mi-tooltip" style={{ left, top }}>
      {title && <div className="tip-title">{title}</div>}
      {rows && rows.map((r, i) => (
        <div className="tip-row" key={i}>
          <span>{r.k}</span>
          <span className={`v ${r.cls || ''}`}>{r.v}</span>
        </div>
      ))}
    </div>
  );
}

/* === Top suppliers — horizontal ranked bars (green) === */
function TopSuppliersBars({ suppliers, currency, onHover, openProfile }) {
  const valued = suppliers.filter(s => s.ddpLowINR != null && !s.isPlaceholder);
  const sorted = [...valued].sort((a, b) => ((a.ddpLowINR + a.ddpHighINR) / 2) - ((b.ddpLowINR + b.ddpHighINR) / 2));
  const maxMid = Math.max(...sorted.map(s => (s.ddpLowINR + s.ddpHighINR) / 2));

  const handleMove = (s, ev) => onHover && onHover({

/* === Top regions — horizontal ranked bars (blue) === */

/* === Price distribution histogram === */
function PriceHistogram({ suppliers, currency, onHover }) {
  const valued = suppliers.filter(s => s.ddpLowINR != null);
  if (valued.length === 0) return <div style={{color: '#8B95A7', textAlign: 'center', padding: '60px 0'}}>No price data.</div>;
  const mids = valued.map(s => (s.ddpLowINR + s.ddpHighINR) / 2);
  const min = Math.min(...mids) * 0.9;
  const max = Math.max(...mids) * 1.1;
  const buckets = 12;
  const step = (max - min) / buckets;
  const counts = new Array(buckets).fill(0).map((_, i) => ({
    lo: min + step * i,
    hi: min + step * (i + 1),
    count: 0,
    names: []
  }));
  valued.forEach(s => {
    const mid = (s.ddpLowINR + s.ddpHighINR) / 2;
    let idx = Math.min(buckets - 1, Math.floor((mid - min) / step));
    counts[idx].count++;
    counts[idx].names.push(s.name);
  });
  const peakIdx = counts.reduce((mi, b, i) => b.count > counts[mi].count ? i : mi, 0);
  const median = mids.sort((a, b) => a - b)[Math.floor(mids.length / 2)];
  const maxCount = Math.max(...counts.map(c => c.count));
  const handleMove = (b, ev) => onHover && onHover({
    visible: true, x: ev.clientX, y: ev.clientY,
    title: `${fmtMoney(b.lo, currency)} – ${fmtMoney(b.hi, currency)}`,
    rows: [
      { k: 'Suppliers', v: b.count, cls: 'green' },
      ...(b.names.length > 0 ? [{ k: 'Names', v: b.names.join(', ') }] : [])
    ]
  });
  const handleLeave = () => onHover && onHover({ visible: false });
  return (
    <>
      <div className="mi-hist">
        {counts.map((b, i) => (
          <div
            key={i}
            className={`mi-hist-bar ${i === peakIdx ? 'peak' : ''}`}
            style={{height: `${Math.max(4, (b.count / maxCount) * 100)}%`}}
            onMouseMove={ev => handleMove(b, ev)}
            onMouseLeave={handleLeave}
          >
            {i === peakIdx && (
              <span className="peak-label">Median<br/>{fmtMoney(median, currency)}</span>
            )}
          </div>
        ))}
      </div>
      <div className="mi-hist-axis">
        <span>{fmtMoney(min, currency)}</span>
        <span>{fmtMoney(min + (max - min) * 0.25, currency)}</span>
        <span>{fmtMoney(min + (max - min) * 0.5, currency)}</span>
        <span>{fmtMoney(min + (max - min) * 0.75, currency)}</span>
        <span>{fmtMoney(max, currency)}</span>
      </div>
    </>
  );
}

/* === Lead-time band per supplier === */
function LeadTimeBand({ suppliers, onHover, openProfile }) {
